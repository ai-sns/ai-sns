<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js GLB Model Loader</title>
    <style>
        body {
            margin: 0;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/three@0.129.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
    // 创建场景
    const scene = new THREE.Scene();

    // 创建相机并设置位置
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1, 3); // 设置相机位置

    // 创建渲染器并设置大小
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement); // 将渲染器的 canvas 添加到文档中

    // 添加光源
    const ambientLight = new THREE.AmbientLight(0xffffff, 1); // 环境光
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1); // 定向光
    directionalLight.position.set(0, 1, 1);
    scene.add(directionalLight);

    // 加载 3D 模型
    const loader = new THREE.GLTFLoader();
    loader.load('cbot.glb', (gltf) => {
        const model = gltf.scene;
        scene.add(model); // 将模型添加到场景中

        // 给模型添加点击事件
        model.traverse((child) => {
            if (child.isMesh) {
                child.cursor = 'pointer'; // 设置鼠标光标样式
                child.userData.isClickable = true; // 设置可点击属性
            }
        });
    }, undefined, (error) => {
        console.error(error); // 输出错误信息
    });

    // 添加鼠标点击事件
    window.addEventListener('click', (event) => {
        const mouse = new THREE.Vector2();
        const raycaster = new THREE.Raycaster();

        // 将鼠标坐标标准化到 -1 到 1 的范围
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        // 使用射线检测模型
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(scene.children, true);

        // 如果有交集，则点击了模型
        if (intersects.length > 0 && intersects[0].object.userData.isClickable) {
            alert('hello'); // 弹出提示
        }
    });

    // 动画循环
    const animate = () => {
        requestAnimationFrame(animate);
        renderer.render(scene, camera); // 渲染场景
    };
    animate();

    // 响应窗口大小变化
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix(); // 更新相机投影矩阵
        renderer.setSize(window.innerWidth, window.innerHeight); // 设置渲染器大小
    });
</script>
</body>
</html>
