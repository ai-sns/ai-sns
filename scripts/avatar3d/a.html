<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Ready Player Me 无 import 动画示例</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; }
  canvas { width: 100%; height: 100%; display: block; }
</style>

<!--&lt;!&ndash; Three.js（非模块版） &ndash;&gt;-->
<!--<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>-->

<!--&lt;!&ndash; GLTFLoader（非模块版） &ndash;&gt;-->
<!--<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/examples/js/loaders/GLTFLoader.js"></script>-->

<!--&lt;!&ndash; OrbitControls（非模块版） &ndash;&gt;-->
<!--<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/examples/js/controls/OrbitControls.js"></script>-->

    <script src="https://unpkg.com/three@0.129.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.129.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/meshoptimizer@0.17.0/meshopt_decoder.js"></script>

</head>
<body>
<script>
// ========== 基础场景 ==========
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x101010);

const camera = new THREE.PerspectiveCamera(
  45,
  window.innerWidth / window.innerHeight,
  0.1,
  100
);
camera.position.set(0, 1.6, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.3, 0);

// 灯光
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.2));
const dir = new THREE.DirectionalLight(0xffffff, 1);
dir.position.set(3, 10, 5);
scene.add(dir);

let mixer;
const clock = new THREE.Clock();

// ⭐⭐ 在这里替换你的 Ready Player Me GLB ⭐⭐
const AVATAR_URL = "ctgirlschooljump_0_0_0_0_1_0.glb";

// ========== 加载 GLB ==========
const loader = new THREE.GLTFLoader();
loader.load(
  AVATAR_URL,
  function (gltf) {
    const model = gltf.scene;
    scene.add(model);

    centerModel(model);

    // 如果 glb 中有动画 → 播放第一个
    if (gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(model);
      const action = mixer.clipAction(gltf.animations[0]);
      action.play();
    } else {
      alert("模型加载成功，但该 GLB 文件没有动画！");
    }
  },
  undefined,
  function (err) {
    console.error("GLB 加载失败：", err);
    alert("GLB 加载失败，请检查 URL");
  }
);

// ========== 工具：居中模型 ==========
function centerModel(model) {
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  model.position.sub(center);
  model.position.y = -box.min.y;
}

// ========== 动画循环 ==========
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  if (mixer) mixer.update(delta);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// 响应式
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
