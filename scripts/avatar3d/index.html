<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>RPM Hello World – Smooth Animation</title>
<style>
  body { margin:0; overflow:hidden; background:#222; }
  #btn-container { position:absolute; top:20px; width:100%; text-align:center; }
  button { padding:12px 24px; font-size:18px; background:#4CAF50; color:white; border:none; border-radius:4px; cursor:pointer; }
  button:active { background:#45a049; }
</style>

<!-- Import Map for ES Modules -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="btn-container">
    <button id="sayBtn">Say "Hello World"</button>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0,1.6,1.2);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0,1.55,0);
controls.update();

// Lights
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const dirLight = new THREE.DirectionalLight(0xffffff,1.5);
dirLight.position.set(1,2,3);
scene.add(dirLight);

// --- Variables ---
let mixer = null;
let headMesh = null;
let teethMesh = null;
const clock = new THREE.Clock();

// --- Pseudo Viseme mapping ---
const VISEMES = {
    REST: { mouthClose:0.3 },
    E: { jawOpen:0.4, mouthStretchLeft:0.8, mouthStretchRight:0.8 },
    O: { jawOpen:0.6, mouthFunnel:0.9, mouthPucker:0.6 },
    L_D: { jawOpen:0.4, mouthRollUpper:0.6, mouthRollLower:0.4 }
};

// Hello World sequence: [visemeName, duration(ms)]
const SEQUENCE = [
    ["E",140], ["O",180], ["REST",100], ["O",160], ["L_D",140]
];

// --- Load GLB ---
const loader = new GLTFLoader();
loader.load(
    './officeyoumanblue_0_0_0_0_1_0.glb',
    (gltf)=>{
        const model = gltf.scene;
        scene.add(model);

        model.traverse(obj=>{
            if(obj.isMesh && obj.morphTargetDictionary){
                if(obj.name==="Wolf3D_Head") headMesh=obj;
                if(obj.name==="Wolf3D_Teeth") teethMesh=obj;
            }
        });

        if(headMesh) mixer = new THREE.AnimationMixer(headMesh);
    },
    undefined,
    err=>console.error("GLB load error:",err)
);

// --- Generate AnimationClip from SEQUENCE ---
function createVisemeClip(mesh, sequence){
    const dict = mesh.morphTargetDictionary;
    if(!dict) return null;
    const tracks = [];

    // collect all morph names used in the sequence
    const usedMorphs = new Set();
    sequence.forEach(([name]) => Object.keys(VISEMES[name]).forEach(m => usedMorphs.add(m)));

    usedMorphs.forEach(morphName => {
        const index = dict[morphName];
        if(index===undefined) return;
        const times = [];
        const values = [];
        let t = 0;
        sequence.forEach(([name,duration])=>{
            times.push(t/1000);
            values.push(VISEMES[name][morphName] ?? 0);
            t += duration;
        });
        // end frame REST
        times.push(t/1000);
        values.push(VISEMES.REST[morphName] ?? 0);
        tracks.push(new THREE.NumberKeyframeTrack(`.morphTargetInfluences[${index}]`, times, values));
    });

    return new THREE.AnimationClip('HelloWorld', -1, tracks);
}

// --- Button Event ---
document.getElementById('sayBtn').addEventListener('click',()=>{
    if(!headMesh || !mixer) return;
    const clip = createVisemeClip(headMesh, SEQUENCE);
    if(!clip) return;

    const action = mixer.clipAction(clip);
    action.setLoop(THREE.LoopOnce);
    action.clampWhenFinished = true;
    mixer.stopAllAction();
    action.reset();
    action.play();

    // TTS
    const utter = new SpeechSynthesisUtterance("Hello World");
    utter.rate = 0.9;
    window.speechSynthesis.speak(utter);
});

// --- Animate ---
function animate(){
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    if(mixer) mixer.update(delta);

    // Sync teeth morphs to head
    if(headMesh && teethMesh){
        if(teethMesh.morphTargetInfluences.length === headMesh.morphTargetInfluences.length){
            for(let i=0;i<headMesh.morphTargetInfluences.length;i++){
                teethMesh.morphTargetInfluences[i] = headMesh.morphTargetInfluences[i];
            }
        }
    }

    renderer.render(scene,camera);
}
animate();

// --- Resize ---
window.addEventListener('resize',()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
