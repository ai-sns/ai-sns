<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lip Sync: Speed & Amplitude Control</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', sans-serif; color: white; }

        #ui-wrapper {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 600px;
            display: flex; flex-direction: column; gap: 15px;
            background: rgba(0,0,0,0.85); padding: 25px;
            border-radius: 16px; backdrop-filter: blur(12px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
        }

        /* 控制区布局 */
        .control-group { display: flex; flex-direction: column; gap: 12px; }
        .control-row { display: flex; align-items: center; gap: 15px; }

        /* 输入框和按钮 */
        input[type="text"] {
            flex: 1; padding: 12px 15px; border-radius: 8px; border: 1px solid #444;
            background: rgba(40,40,40,0.9); color: white; font-size: 16px; outline: none;
            transition: border 0.2s;
        }
        input[type="text"]:focus { border-color: #ff0055; }

        button {
            padding: 12px 30px; font-size: 16px; font-weight: 600; border: none; border-radius: 8px;
            cursor: pointer; background: linear-gradient(135deg, #ff0055, #ff5500); color: white;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:active { transform: scale(0.96); }
        button:disabled { background: #555; opacity: 0.7; cursor: not-allowed; }

        /* 滑竿区域 */
        .slider-box {
            background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 8px;
            display: flex; flex-direction: column; gap: 5px;
        }
        .slider-header {
            display: flex; justify-content: space-between; font-size: 13px; color: #ccc; font-weight: 500;
        }
        input[type="range"] {
            width: 100%; cursor: pointer; height: 6px; border-radius: 5px; appearance: none; background: #444;
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none; width: 16px; height: 16px; background: #fff; border-radius: 50%; cursor: pointer;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

<div id="ui-wrapper">
    <div class="control-group">
        <!-- 速度滑竿 -->
        <div class="slider-box">
            <div class="slider-header">
                <span>Duration (Speed)</span>
                <span id="speedDisplay">1.0x</span>
            </div>
            <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>

        <!-- 幅度滑竿 -->
        <div class="slider-box">
            <div class="slider-header">
                <span>Amplitude (Intensity)</span>
                <span id="ampDisplay">1.0x</span>
            </div>
            <input type="range" id="ampSlider" min="0.1" max="2.0" step="0.1" value="1.0">
        </div>
    </div>

    <!-- 文本输入 -->
    <div class="control-row">
        <input type="text" id="textInput" value="Hello world, nice to meet you." placeholder="Type phrase...">
        <button id="speakBtn">Speak</button>
    </div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- 1. 配置参数 ---
    const CONFIG = {
        baseCharTime: 0.12,
        sampleRate: 60,
        smoothRadius: 6,
        overlapFactor: 0.60,
        speedMultiplier: 1.0,      // 速度控制
        amplitudeMultiplier: 1.0   // <--- 新增：幅度控制
    };

    // --- 2. 丝滑惯性映射表 (Inertia Mode) ---
    const VISEMES = {
        'sil': { jawOpen: 0.02, mouthClose: 0.05 },
        'h': { jawOpen: 0.08 },
        'a': { jawOpen: 0.22, mouthSmile: 0.1 },
        'e': { jawOpen: 0.18, mouthSmile: 0.15 },
        'i': { jawOpen: 0.15, mouthSmile: 0.15, mouthStretchLeft: 0.1 },
        'o': { jawOpen: 0.22, mouthFunnel: 0.4, mouthPucker: 0.1 },
        'u': { jawOpen: 0.10, mouthPucker: 0.5 },
        'l': { jawOpen: 0.16, mouthShrugLower: 0.05 },
        'n': { jawOpen: 0.15, mouthShrugLower: 0.05 },
        't': { jawOpen: 0.10, mouthShrugLower: 0 },
        'd': { jawOpen: 0.10, mouthShrugLower: 0 },
        'b': { jawOpen: 0, mouthClose: 0.25 },
        'p': { jawOpen: 0, mouthClose: 0.28, mouthPressLeft: 0.1 },
        'm': { jawOpen: 0, mouthClose: 0.25 },
        'f': { jawOpen: 0.05, mouthShrugLower: 0.15, mouthRollLower: 0.1 },
        'w': { jawOpen: 0.05, mouthPucker: 0.4 },
        'r': { jawOpen: 0.12, mouthFunnel: 0.15 },
        's': { jawOpen: 0.05, mouthSmile: 0.1, mouthShrugUpper: 0.1 },
    };

    const CHAR_MAP = {
        'c': 's', 'g': 'k', 'j': 's', 'k': 't',
        'q': 'w', 'v': 'f', 'x': 's', 'y': 'i', 'z': 's'
    };

    // --- 3. 场景初始化 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.62, 0.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.58, 0);
    controls.enablePan = false;
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.0);
    keyLight.position.set(-1, 2, 3);
    scene.add(keyLight);
    const rimLight = new THREE.DirectionalLight(0xff0055, 2.0); // 换个时尚的背光色
    rimLight.position.set(2, 2, -1.5);
    scene.add(rimLight);

    // --- 4. 变量 ---
    let faceMixer = null;
    let bodyMixer = null;
    let headMesh = null;
    let teethMesh = null;
    const clock = new THREE.Clock();

    // --- 5. 加载模型 ---
    const loader = new GLTFLoader();
    loader.load('./officeyoumanblue_0_0_0_0_1_0.glb', (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        if (gltf.animations.length > 0) {
            bodyMixer = new THREE.AnimationMixer(model);
            const action = bodyMixer.clipAction(gltf.animations[0]);
            action.play();
            action.timeScale = 0.5;
        }

        model.traverse((child) => {
            if (child.isMesh && child.morphTargetDictionary) {
                if (child.name === 'Wolf3D_Head') headMesh = child;
                if (child.name === 'Wolf3D_Teeth') teethMesh = child;
            }
        });
        if (headMesh) faceMixer = new THREE.AnimationMixer(headMesh);
    });

    // --- 6. 核心算法 ---
    function generateCoarticulatedAnim(text) {
        if (!headMesh) return null;

        const rawText = text.toLowerCase().replace(/[^a-z ]/g, '');
        const dictionary = headMesh.morphTargetDictionary;

        const allMorphs = new Set();
        Object.values(VISEMES).forEach(v => Object.keys(v).forEach(k => allMorphs.add(k)));

        let totalTime = 0;
        const charTimings = [];
        const currentBaseTime = CONFIG.baseCharTime * CONFIG.speedMultiplier;

        for (let i = 0; i < rawText.length; i++) {
            const char = rawText[i];
            let dur = currentBaseTime;

            if (['a','e','i','o','u'].includes(char)) dur *= 1.2;
            if (char === ' ') dur = 0.05;

            // 双字母合并
            if (i < rawText.length - 1 && rawText[i+1] === char) {
                dur *= 1.5;
                i++;
            }

            charTimings.push({
                char: char,
                start: totalTime,
                end: totalTime + dur
            });
            totalTime += (dur * CONFIG.overlapFactor);
        }
        totalTime += 0.3;

        const totalFrames = Math.ceil(totalTime * CONFIG.sampleRate);
        const buffers = {};

        allMorphs.forEach(m => {
            buffers[m] = new Float32Array(totalFrames).fill(0);
        });

        charTimings.forEach(ct => {
            const startFrame = Math.floor(ct.start * CONFIG.sampleRate);
            const endFrame = Math.ceil(ct.end * CONFIG.sampleRate);

            let targetShapes = VISEMES['sil'];
            const c = ct.char;

            if (c === ' ') targetShapes = VISEMES['sil'];
            else if (VISEMES[c]) targetShapes = VISEMES[c];
            else if (CHAR_MAP[c] && VISEMES[CHAR_MAP[c]]) targetShapes = VISEMES[CHAR_MAP[c]];

            Object.keys(targetShapes).forEach(morphName => {
                if (buffers[morphName]) {
                    // *** 关键修改：应用幅度倍率 ***
                    // 原始值 * 倍率
                    let val = targetShapes[morphName] * CONFIG.amplitudeMultiplier;

                    // 稍微做一个限制，防止数值爆表导致模型崩坏 (大于1.5通常就不太好看了)
                    // 虽然 ARKit 支持 >1，但这里我们柔和限制一下
                    if(val > 1.2) val = 1.2;

                    for (let f = startFrame; f < endFrame; f++) {
                        if (f < totalFrames) {
                            buffers[morphName][f] = Math.max(buffers[morphName][f], val);
                        }
                    }
                }
            });
        });

        // 平滑
        const currentSmoothRadius = Math.max(2, Math.floor(CONFIG.smoothRadius * CONFIG.speedMultiplier));
        allMorphs.forEach(morphName => {
            const rawBuffer = buffers[morphName];
            const smoothedBuffer = new Float32Array(totalFrames);

            for (let i = 0; i < totalFrames; i++) {
                let sum = 0;
                let count = 0;
                for (let j = i - currentSmoothRadius; j <= i + currentSmoothRadius; j++) {
                    if (j >= 0 && j < totalFrames) {
                        sum += rawBuffer[j];
                        count++;
                    }
                }
                smoothedBuffer[i] = sum / count;
            }
            buffers[morphName] = smoothedBuffer;
        });

        const tracks = [];
        allMorphs.forEach(morphName => {
            const idx = dictionary[morphName];
            if (idx === undefined) return;

            const times = [];
            const values = [];

            for (let i = 0; i < totalFrames; i++) {
                times.push(i / CONFIG.sampleRate);
                values.push(buffers[morphName][i]);
            }

            if (Math.max(...values) > 0.001) {
                tracks.push(new THREE.NumberKeyframeTrack(
                    `.morphTargetInfluences[${idx}]`,
                    times,
                    values,
                    THREE.InterpolateLinear
                ));
            }
        });

        return { clip: new THREE.AnimationClip('FluidSpeech', totalTime, tracks), duration: totalTime };
    }

    // --- 7. UI 事件 ---
    const btn = document.getElementById('speakBtn');
    const input = document.getElementById('textInput');

    // 速度滑竿
    const speedSlider = document.getElementById('speedSlider');
    const speedDisplay = document.getElementById('speedDisplay');
    speedSlider.addEventListener('input', (e) => {
        CONFIG.speedMultiplier = parseFloat(e.target.value);
        speedDisplay.innerText = CONFIG.speedMultiplier.toFixed(1) + "x";
    });

    // 幅度滑竿
    const ampSlider = document.getElementById('ampSlider');
    const ampDisplay = document.getElementById('ampDisplay');
    ampSlider.addEventListener('input', (e) => {
        CONFIG.amplitudeMultiplier = parseFloat(e.target.value);
        ampDisplay.innerText = CONFIG.amplitudeMultiplier.toFixed(1) + "x";
    });

    // 眨眼
    const blinkState = { val: 0, isBlinking: false, nextTime: 2 };
    function updateBlink(dt) {
        if (!headMesh) return;
        const idxL = headMesh.morphTargetDictionary['eyeBlinkLeft'];
        const idxR = headMesh.morphTargetDictionary['eyeBlinkRight'];
        if (idxL === undefined) return;

        if (blinkState.isBlinking) {
            blinkState.val += 0.15;
            if (blinkState.val >= 1) { blinkState.val = 1; blinkState.isBlinking = false; }
        } else if (blinkState.val > 0) {
            blinkState.val -= 0.1;
        } else {
            blinkState.nextTime -= dt;
            if (blinkState.nextTime <= 0) {
                blinkState.isBlinking = true;
                blinkState.nextTime = 2 + Math.random() * 3;
            }
        }
        headMesh.morphTargetInfluences[idxL] = Math.max(0, blinkState.val);
        headMesh.morphTargetInfluences[idxR] = Math.max(0, blinkState.val);
    }

    btn.addEventListener('click', () => {
        if (!faceMixer) return;
        const text = input.value;
        const utterance = new SpeechSynthesisUtterance(text);

        // 1. 生成动画
        const animData = generateCoarticulatedAnim(text);
        if (!animData || !animData.clip) return;

        btn.disabled = true;

        // 2. 播放
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);

        const action = faceMixer.clipAction(animData.clip);
        action.setLoop(THREE.LoopOnce);
        action.clampWhenFinished = true;

        faceMixer.stopAllAction();
        action.reset();

        setTimeout(() => {
            action.play();
        }, 300);

        utterance.onend = () => {
            btn.disabled = false;
            action.fadeOut(0.5);
        };
    });

    // --- 8. 循环 ---
    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        if (bodyMixer) bodyMixer.update(delta);
        if (faceMixer) faceMixer.update(delta);
        updateBlink(delta);

        if (headMesh && teethMesh) {
            if(headMesh.morphTargetInfluences.length === teethMesh.morphTargetInfluences.length) {
                 for (let i = 0; i < headMesh.morphTargetInfluences.length; i++) {
                     teethMesh.morphTargetInfluences[i] = headMesh.morphTargetInfluences[i];
                }
            }
        }
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
