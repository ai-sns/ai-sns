<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Audio Driven Lip Sync (Microphone)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Microsoft YaHei', sans-serif; color: white; }

        .hint {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px;
            font-size: 13px; color: #aaa; pointer-events: none;
        }

        #ui-wrapper {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 500px;
            display: flex; flex-direction: column; gap: 15px;
            background: rgba(0,0,0,0.85); padding: 25px;
            border-radius: 16px; backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        button {
            padding: 15px; font-size: 16px; font-weight: 600; border: none; border-radius: 8px;
            cursor: pointer; background: linear-gradient(135deg, #00c6ff, #0072ff); color: white;
            transition: transform 0.1s; width: 100%;
        }
        button:active { transform: scale(0.98); }
        button.active { background: #ff4b4b; }

        .slider-row { display: flex; flex-direction: column; gap: 5px; color: #ddd; font-size: 14px; }
        input[type="range"] { width: 100%; accent-color: #00c6ff; }

        /* 简单的音频波形指示器 */
        #visualizer {
            height: 10px; background: #333; border-radius: 5px; overflow: hidden; margin-top: 5px;
        }
        #volume-bar {
            height: 100%; width: 0%; background: #00c6ff; transition: width 0.05s;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

<div class="hint">请允许麦克风权限<br>对着麦克风说话即可驱动</div>

<div id="ui-wrapper">
    <button id="micBtn">🎙️ 开启麦克风同步</button>

    <div id="visualizer"><div id="volume-bar"></div></div>

    <div class="slider-row">
        <label>灵敏度 (Sensitivity)</label>
        <input type="range" id="sensSlider" min="1" max="10" step="0.5" value="5">
    </div>
    <div class="slider-row">
        <label>平滑度 (Smoothing)</label>
        <input type="range" id="smoothSlider" min="0.1" max="0.9" step="0.05" value="0.5">
    </div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- 1. 场景标准初始化 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.62, 0.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.58, 0);
    controls.enablePan = true; controls.enableDamping = true;
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.0);
    keyLight.position.set(-1, 2, 3);
    scene.add(keyLight);
    const rimLight = new THREE.DirectionalLight(0x00c6ff, 2.0); // 蓝色背光
    rimLight.position.set(2, 2, -1.5);
    scene.add(rimLight);

    let bodyMixer, headMesh, teethMesh;
    const clock = new THREE.Clock();

    // --- 2. 加载模型 ---
    const loader = new GLTFLoader();
    loader.load('./officeyoumanblue_0_0_0_0_1_0.glb', (gltf) => {
        const model = gltf.scene;
        scene.add(model);
        if (gltf.animations.length > 0) {
            bodyMixer = new THREE.AnimationMixer(model);
            const action = bodyMixer.clipAction(gltf.animations[0]);
            action.play(); action.timeScale = 0.5;
        }
        model.traverse(child => {
            if (child.isMesh && child.morphTargetDictionary) {
                if (child.name === 'Wolf3D_Head') headMesh = child;
                if (child.name === 'Wolf3D_Teeth') teethMesh = child;
            }
        });
    });

    // --- 3. 音频分析系统 ---
    let audioContext, analyser, microphone, dataArray;
    let isMicActive = false;
    let currentLips = {
        jawOpen: 0,
        mouthFunnel: 0,
        mouthSmile: 0,
        mouthPucker: 0
    };

    // 配置
    const CONFIG = {
        sensitivity: 5.0,  // 灵敏度
        smoothing: 0.5,    // 平滑度 (0-1)
        threshold: 0.05    // 噪音门限
    };

    // 启动麦克风
    async function startMicrophone() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            microphone = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();

            analyser.fftSize = 512; // 频域分割精度
            microphone.connect(analyser);

            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);

            isMicActive = true;
            document.getElementById('micBtn').textContent = "🔴 停止同步";
            document.getElementById('micBtn').classList.add('active');
        } catch (err) {
            console.error('麦克风获取失败:', err);
            alert("无法获取麦克风权限");
        }
    }

    function stopMicrophone() {
        if (audioContext) audioContext.close();
        isMicActive = false;
        document.getElementById('micBtn').textContent = "🎙️ 开启麦克风同步";
        document.getElementById('micBtn').classList.remove('active');
        // 归零
        if (headMesh) {
            headMesh.morphTargetInfluences.fill(0);
        }
    }

    // --- 4. 核心：音频 -> 口型映射逻辑 ---
    function updateLipSync() {
        if (!isMicActive || !analyser || !headMesh) return;

        // 获取频域数据 (0-255)
        analyser.getByteFrequencyData(dataArray);

        // 1. 计算总音量 (Energy) -> 控制张嘴
        let sum = 0;
        // 只取前一半频率，因为人声主要在中低频
        for (let i = 0; i < dataArray.length / 2; i++) {
            sum += dataArray[i];
        }
        let average = sum / (dataArray.length / 2);

        // 归一化 (0.0 - 1.0)
        let volume = (average / 100) * CONFIG.sensitivity; // 乘灵敏度

        // 噪音门限
        if (volume < CONFIG.threshold) volume = 0;
        if (volume > 1.2) volume = 1.2; // 封顶

        // 更新 UI 条
        document.getElementById('volume-bar').style.width = Math.min(100, volume * 100) + '%';

        // 2. 简易频段分析
        // 这里的索引取决于 fftSize (512) -> binCount (256)
        // 采样率通常 44.1kHz，每个 bin 大约是 44100 / 512 = 86Hz 宽

        // 低频 (Bass): ~100-300Hz (Bin 1-4) -> O/U 音 (Funnel/Pucker)
        let bass = (dataArray[1] + dataArray[2] + dataArray[3]) / 3 / 255;

        // 高频 (Treble): ~2000-4000Hz (Bin 20-50) -> S/T/Ch 音 (Smile)
        let trebleSum = 0;
        for(let i=20; i<50; i++) trebleSum += dataArray[i];
        let treble = (trebleSum / 30) / 255;

        // 3. 目标形状计算
        let targetJawOpen = volume * 0.8;

        // 如果是强音量且低频重 -> O型嘴
        let targetFunnel = (bass > 0.4 && volume > 0.3) ? bass * 1.5 : 0;

        // 如果是强音量且高频重 -> 扁嘴 (Smile/Teeth)
        let targetSmile = (treble > 0.2 && volume > 0.2) ? treble * 2.0 : 0;

        // 4. 平滑插值 (Lerp)
        // 将当前值平滑过渡到目标值
        const smooth = 1 - CONFIG.smoothing; // 越大越灵敏，越小越平滑

        currentLips.jawOpen = THREE.MathUtils.lerp(currentLips.jawOpen, targetJawOpen, smooth);
        currentLips.mouthFunnel = THREE.MathUtils.lerp(currentLips.mouthFunnel, targetFunnel, smooth);
        currentLips.mouthSmile = THREE.MathUtils.lerp(currentLips.mouthSmile, targetSmile, smooth);

        // 5. 应用到模型
        const dict = headMesh.morphTargetDictionary;
        headMesh.morphTargetInfluences[dict['jawOpen']] = currentLips.jawOpen;
        headMesh.morphTargetInfluences[dict['mouthFunnel']] = currentLips.mouthFunnel;
        headMesh.morphTargetInfluences[dict['mouthPucker']] = currentLips.mouthFunnel * 0.5; // O音同时也带点Pucker
        headMesh.morphTargetInfluences[dict['mouthSmile']] = currentLips.mouthSmile;
        headMesh.morphTargetInfluences[dict['mouthShrugUpper']] = currentLips.mouthSmile * 0.5; // 高频时提上唇露牙
    }

    // --- 5. UI 事件 ---
    const micBtn = document.getElementById('micBtn');
    micBtn.addEventListener('click', () => {
        if (!isMicActive) startMicrophone();
        else stopMicrophone();
    });

    document.getElementById('sensSlider').addEventListener('input', (e) => CONFIG.sensitivity = e.target.value);
    document.getElementById('smoothSlider').addEventListener('input', (e) => CONFIG.smoothing = e.target.value);

    // 眨眼逻辑
    const blinkState = { val: 0, isBlinking: false, nextTime: 2 };
    function updateBlink(dt) {
        if (!headMesh) return;
        const idxL = headMesh.morphTargetDictionary['eyeBlinkLeft'];
        const idxR = headMesh.morphTargetDictionary['eyeBlinkRight'];
        if (!idxL) return;

        if (blinkState.isBlinking) {
            blinkState.val += 0.15;
            if (blinkState.val >= 1) { blinkState.val = 1; blinkState.isBlinking = false; }
        } else if (blinkState.val > 0) {
            blinkState.val -= 0.1;
        } else {
            blinkState.nextTime -= dt;
            if (blinkState.nextTime <= 0) {
                blinkState.isBlinking = true;
                blinkState.nextTime = 2 + Math.random() * 3;
            }
        }
        headMesh.morphTargetInfluences[idxL] = Math.max(0, blinkState.val);
        headMesh.morphTargetInfluences[idxR] = Math.max(0, blinkState.val);
    }

    // --- 6. 循环 ---
    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        if (bodyMixer) bodyMixer.update(delta);

        updateLipSync(); // <--- 每一帧更新音频口型
        updateBlink(delta);
        controls.update();

        if (headMesh && teethMesh) {
             for (let i = 0; i < headMesh.morphTargetInfluences.length; i++) {
                 teethMesh.morphTargetInfluences[i] = headMesh.morphTargetInfluences[i];
            }
        }
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
