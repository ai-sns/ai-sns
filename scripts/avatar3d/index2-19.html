<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandarin Lip Sync - Event Driven Sync</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Microsoft YaHei', sans-serif; color: white; }

        .controls-hint {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px;
            font-size: 13px; color: #aaa; pointer-events: none; user-select: none;
            line-height: 1.6;
            z-index: 10;
        }

        #ui-wrapper {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px;
            display: flex; flex-direction: column; gap: 12px;
            background: rgba(0,0,0,0.85); padding: 25px;
            border-radius: 16px; backdrop-filter: blur(12px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
        }

        .sliders-row { display: flex; gap: 15px; }
        .slider-box {
            flex: 1; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px;
            display: flex; flex-direction: column; gap: 6px;
        }
        .slider-header { display: flex; justify-content: space-between; font-size: 12px; color: #ccc; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #ff0055; height: 4px; }

        .voice-box {
            background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px;
            display: flex; flex-direction: column; gap: 6px;
        }
        .voice-label { font-size: 12px; color: #ccc; }
        select {
            width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #444;
            background: #333; color: white; font-size: 14px; outline: none; cursor: pointer;
        }

        .input-row { display: flex; align-items: center; gap: 10px; margin-top: 5px;}
        input[type="text"] {
            flex: 1; padding: 12px 14px; border-radius: 8px; border: 1px solid #444;
            background: rgba(40,40,40,0.9); color: white; font-size: 15px; outline: none;
            transition: border 0.2s;
        }
        input[type="text"]:focus { border-color: #ff0055; }

        button {
            padding: 12px 28px; font-size: 15px; font-weight: 600; border: none; border-radius: 8px;
            cursor: pointer; background: linear-gradient(135deg, #ff0055, #ff5500); color: white;
            white-space: nowrap; transition: transform 0.1s;
        }
        button:active { transform: scale(0.96); }
        button:disabled { background: #555; cursor: wait; opacity: 0.7; }

        /* 同步状态指示灯 */
        #sync-indicator {
            position: absolute; top: -10px; right: 10px; font-size: 10px;
            background: #222; padding: 4px 8px; border-radius: 4px; border: 1px solid #444;
            display: none;
        }
        #sync-indicator.active { display: block; color: #00ff00; border-color: #00ff00; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://unpkg.com/pinyin-pro@3.18.3/dist/index.js"></script>
</head>
<body>

<div class="controls-hint">
    🖱️ 左键: 旋转 | 右键: 平移 | 滚轮: 缩放<br>
    支持：实时语音边界校准 (OnBoundary)
</div>

<div id="ui-wrapper">
    <div id="sync-indicator">🟢 实时同步中...</div>

    <div class="sliders-row">
        <div class="slider-box">
            <div class="slider-header"><span>口型速度</span><span id="speedDisplay">1.0x</span></div>
            <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>
        <div class="slider-box">
            <div class="slider-header"><span>张嘴幅度</span><span id="ampDisplay">1.0x</span></div>
            <input type="range" id="ampSlider" min="0.1" max="2.0" step="0.1" value="1.0">
        </div>
    </div>

    <div class="voice-box">
        <div class="voice-label">选择声音 (建议选 Microsoft Kangkang/Huihui)</div>
        <select id="voiceSelect"><option value="">加载中...</option></select>
    </div>

    <div class="input-row">
        <input type="text" id="textInput" value="你好，我是你的数字人朋友。我们可以通过事件监听实现完美同步。" placeholder="输入中文...">
        <button id="speakBtn">说话</button>
    </div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- 1. 配置 ---
    const CONFIG = {
        syllableTime: 0.20,
        sampleRate: 60,
        smoothRadius: 5,
        initialRatio: 0.3,
        pauseComma: 0.3,
        pauseSentence: 0.8,
        speedMult: 1.0,
        ampMult: 1.0
    };

    // --- 2. 映射表 (保持不变) ---
    const INITIALS_MAP = {
        'sil': { jawOpen: 0, mouthClose: 0.1 },
        'b': { jawOpen: 0, mouthClose: 0.3 },
        'p': { jawOpen: 0, mouthClose: 0.35, mouthPressLeft: 0.15 },
        'm': { jawOpen: 0, mouthClose: 0.3 },
        'f': { jawOpen: 0.05, mouthShrugLower: 0.2, mouthRollLower: 0.15 },
        'd': { jawOpen: 0.05, mouthShrugLower: 0.05 },
        't': { jawOpen: 0.05, mouthShrugLower: 0.05 },
        'n': { jawOpen: 0.1, mouthShrugLower: 0.05 },
        'l': { jawOpen: 0.12, mouthShrugLower: 0.05 },
        'g': { jawOpen: 0.1 }, 'k': { jawOpen: 0.1 }, 'h': { jawOpen: 0.1 },
        'j': { jawOpen: 0.05, mouthSmile: 0.2 }, 'q': { jawOpen: 0.05, mouthSmile: 0.2 }, 'x': { jawOpen: 0.05, mouthSmile: 0.2 },
        'zh': { jawOpen: 0.08, mouthFunnel: 0.15, mouthPucker: 0.1 },
        'ch': { jawOpen: 0.08, mouthFunnel: 0.15, mouthPucker: 0.1 },
        'sh': { jawOpen: 0.08, mouthFunnel: 0.15, mouthPucker: 0.1 },
        'r':  { jawOpen: 0.08, mouthFunnel: 0.15 },
        'z':  { jawOpen: 0.05, mouthSmile: 0.15 }, 'c':  { jawOpen: 0.05, mouthSmile: 0.15 },
        's':  { jawOpen: 0.05, mouthSmile: 0.15, mouthShrugUpper: 0.1 },
        'w':  { jawOpen: 0.05, mouthPucker: 0.4 }, 'y':  { jawOpen: 0.05, mouthSmile: 0.2 }
    };
    const FINALS_MAP = {
        'sil': { jawOpen: 0, mouthClose: 0.1 },
        'a':   { jawOpen: 0.25 }, 'o':   { jawOpen: 0.20, mouthFunnel: 0.4 },
        'e':   { jawOpen: 0.15, mouthSmile: 0.15 }, 'i':   { jawOpen: 0.10, mouthSmile: 0.25, mouthStretchLeft: 0.15 },
        'u':   { jawOpen: 0.08, mouthPucker: 0.55 }, 'v':   { jawOpen: 0.08, mouthPucker: 0.6, mouthFunnel: 0.1 },
        'ai':  { jawOpen: 0.22, mouthSmile: 0.15 }, 'ei':  { jawOpen: 0.18, mouthSmile: 0.25 },
        'ao':  { jawOpen: 0.22, mouthFunnel: 0.2, mouthPucker: 0.1 }, 'ou':  { jawOpen: 0.15, mouthPucker: 0.4 },
        'an':  { jawOpen: 0.22, mouthSmile: 0.1 }, 'en':  { jawOpen: 0.15, mouthSmile: 0.15 },
        'ang': { jawOpen: 0.25, mouthShrugUpper: 0.1 }, 'eng': { jawOpen: 0.18, mouthShrugUpper: 0.1 },
        'ong': { jawOpen: 0.15, mouthPucker: 0.4, mouthFunnel: 0.2 }, 'ing': { jawOpen: 0.12, mouthSmile: 0.2 },
        'ian': { jawOpen: 0.18, mouthSmile: 0.2 }, 'iao': { jawOpen: 0.18, mouthSmile: 0.1, mouthPucker: 0.1 },
        'ua':  { jawOpen: 0.22, mouthPucker: 0.2 }, 'uo':  { jawOpen: 0.20, mouthFunnel: 0.35, mouthPucker: 0.2 },
        'ui':  { jawOpen: 0.15, mouthPucker: 0.3, mouthSmile: 0.1 }, 'un':  { jawOpen: 0.15, mouthPucker: 0.4 },
        'er':  { jawOpen: 0.15, mouthShrugLower: 0.2 }
    };
    const DEFAULT_SHAPE = { jawOpen: 0.02, mouthClose: 0.05 };

    // --- 3. 场景 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.62, 0.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.58, 0);
    controls.enablePan = true;
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minPolarAngle = 0.5; controls.maxPolarAngle = 1.8;
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.0);
    keyLight.position.set(-1, 2, 3);
    scene.add(keyLight);
    const rimLight = new THREE.DirectionalLight(0xff0055, 2.0);
    rimLight.position.set(2, 2, -1.5);
    scene.add(rimLight);

    let faceMixer, bodyMixer, headMesh, teethMesh;
    const clock = new THREE.Clock();

    // --- 4. 加载 ---
    const loader = new GLTFLoader();
    const modelUrl = './officeyoumanblue_0_0_0_0_1_0.glb';

    loader.load(modelUrl, (gltf) => {
        const model = gltf.scene;
        scene.add(model);
        if (gltf.animations.length > 0) {
            bodyMixer = new THREE.AnimationMixer(model);
            const action = bodyMixer.clipAction(gltf.animations[0]);
            action.play(); action.timeScale = 0.5;
        }
        model.traverse(child => {
            if (child.isMesh && child.morphTargetDictionary) {
                if (child.name === 'Wolf3D_Head') headMesh = child;
                if (child.name === 'Wolf3D_Teeth') teethMesh = child;
            }
        });
        if (headMesh) faceMixer = new THREE.AnimationMixer(headMesh);
    });

    // --- 5. 声音 ---
    let availableVoices = [];
    const voiceSelect = document.getElementById('voiceSelect');
    function loadVoices() {
        const allVoices = window.speechSynthesis.getVoices();
        availableVoices = allVoices.filter(v => v.lang.includes('zh') || v.name.includes('Chinese'));
        if (availableVoices.length === 0) availableVoices = allVoices;
        voiceSelect.innerHTML = '';
        if(availableVoices.length === 0) {
            const opt = document.createElement('option'); opt.text = "未检测到语音包"; voiceSelect.add(opt); return;
        }
        availableVoices.forEach((voice, index) => {
            const option = document.createElement('option');
            option.value = index;
            option.textContent = `${voice.name} (${voice.lang})`;
            voiceSelect.appendChild(option);
        });
        const defaultIndex = availableVoices.findIndex(v => v.name.includes('Kangkang') || v.name.includes('Male'));
        if (defaultIndex !== -1) voiceSelect.value = defaultIndex;
    }
    loadVoices();
    if (window.speechSynthesis.onvoiceschanged !== undefined) window.speechSynthesis.onvoiceschanged = loadVoices;

    const warmUp = new SpeechSynthesisUtterance("");
    window.speechSynthesis.speak(warmUp);

    // --- 6. 核心算法: 生成动画数据 + 时间映射表 ---
    function generateMandarinAnim(text) {
        if (!headMesh) return null;

        const { pinyin } = window.pinyinPro;
        // pinyinArray 长度等于 text.length (如果不算特殊字符)
        // 我们需要建立 文字索引 -> 拼音 的对应关系
        const pinyinArray = pinyin(text, { type: 'array', toneType: 'none', nonZh: 'consecutive' });

        if (!pinyinArray || pinyinArray.length === 0) return null;

        const dictionary = headMesh.morphTargetDictionary;
        const allMorphs = new Set();
        [INITIALS_MAP, FINALS_MAP].forEach(map => {
            Object.values(map).forEach(shape => Object.keys(shape).forEach(k => allMorphs.add(k)));
        });

        const currentCharTime = CONFIG.syllableTime * CONFIG.speedMult;
        const syllableData = [];
        let totalTime = 0;

        // *** 关键：时间映射表 TimeMap ***
        // timeMap[i] = 文本中第i个字符对应的动画开始时间
        const timeMap = new Array(text.length).fill(null);

        // pinyinPro 处理非中文字符时，可能会合并，我们需要手动对齐
        // 为了简单可靠，我们假设 pinyinArray 和 text 的汉字是一一对应的
        // 我们自己遍历原文本 text

        let pinyinIndex = 0;

        // 使用 pinyin-pro 的逐字模式确保对齐
        const pinyinPerChar = pinyin(text, { type: 'array', toneType: 'none' }); // 默认保留非汉字

        pinyinPerChar.forEach((py, index) => {
            // 记录当前字符的动画开始时间
            timeMap[index] = totalTime;

            // 1. 标点符号
            if (/^[，、,]+$/.test(py)) {
                const pauseTime = CONFIG.pauseComma * CONFIG.speedMult;
                syllableData.push({ initial: 'sil', final: 'sil', startTime: totalTime, endTime: totalTime + pauseTime });
                totalTime += pauseTime;
                return;
            }
            if (/^[。？！!?;；]+$/.test(py)) {
                const pauseTime = CONFIG.pauseSentence * CONFIG.speedMult;
                syllableData.push({ initial: 'sil', final: 'sil', startTime: totalTime, endTime: totalTime + pauseTime });
                totalTime += pauseTime;
                return;
            }

            // 2. 空格/特殊字符
             if (!/^[a-z]+$/.test(py)) {
                totalTime += 0.05;
                return;
            }

            // 3. 正常拼音
            let initial = '', final = py;
            const doubleInitials = ['zh', 'ch', 'sh'];
            if (doubleInitials.some(di => py.startsWith(di))) {
                initial = py.substring(0, 2); final = py.substring(2);
            } else {
                const singleInitials = ['b','p','m','f','d','t','n','l','g','k','h','j','q','x','r','z','c','s','w','y'];
                if (singleInitials.includes(py[0])) { initial = py[0]; final = py.substring(1); }
            }
            if (['j','q','x','y'].includes(initial) && final.startsWith('u')) final = final.replace('u', 'v');

            syllableData.push({
                initial: initial, final: final,
                startTime: totalTime, endTime: totalTime + currentCharTime
            });
            totalTime += currentCharTime;
        });

        totalTime += 0.2;

        const totalFrames = Math.ceil(totalTime * CONFIG.sampleRate);
        const buffers = {};
        allMorphs.forEach(m => buffers[m] = new Float32Array(totalFrames).fill(0));

        syllableData.forEach(syl => {
            const startFrame = Math.floor(syl.startTime * CONFIG.sampleRate);
            const endFrame = Math.ceil(syl.endTime * CONFIG.sampleRate);
            const durationFrames = endFrame - startFrame;

            if (syl.initial === 'sil') {
                const silShape = INITIALS_MAP['sil'];
                Object.keys(buffers).forEach(morphName => {
                    if (silShape[morphName]) {
                        const val = silShape[morphName];
                        for (let f = startFrame; f < endFrame; f++) if (f < totalFrames) buffers[morphName][f] = val;
                    }
                });
                return;
            }

            const initialFrames = Math.floor(durationFrames * CONFIG.initialRatio);
            const initialShape = INITIALS_MAP[syl.initial] || {};
            const finalShape = FINALS_MAP[syl.final] || FINALS_MAP[syl.final[0]] || DEFAULT_SHAPE;

            Object.keys(buffers).forEach(morphName => {
                const buffer = buffers[morphName];
                if (initialShape[morphName]) {
                    let val = initialShape[morphName] * CONFIG.ampMult;
                    if(val > 1.5) val = 1.5;
                    for (let f = 0; f < initialFrames; f++) {
                        const idx = startFrame + f;
                        if (idx < totalFrames) buffer[idx] = Math.max(buffer[idx], val);
                    }
                }
                if (finalShape[morphName]) {
                    let val = finalShape[morphName] * CONFIG.ampMult;
                    if(val > 1.5) val = 1.5;
                    const finalStart = Math.floor(initialFrames * 0.5);
                    for (let f = finalStart; f < durationFrames; f++) {
                        const idx = startFrame + f;
                        if (idx < totalFrames) buffer[idx] = Math.max(buffer[idx], val);
                    }
                }
            });
        });

        allMorphs.forEach(morphName => {
            const buffer = buffers[morphName];
            const smoothed = new Float32Array(totalFrames);
            const r = CONFIG.smoothRadius;
            for(let i=0; i<totalFrames; i++) {
                let sum = 0, count = 0;
                for(let j=i-r; j<=i+r; j++) {
                    if(j>=0 && j<totalFrames) { sum+=buffer[j]; count++; }
                }
                smoothed[i] = sum/count;
            }
            buffers[morphName] = smoothed;
        });

        const tracks = [];
        allMorphs.forEach(morphName => {
            const idx = dictionary[morphName];
            if (idx === undefined) return;
            const times = [], values = [];
            for(let i=0; i<totalFrames; i++) {
                times.push(i/CONFIG.sampleRate);
                values.push(buffers[morphName][i]);
            }
            if (Math.max(...values) > 0.001) {
                tracks.push(new THREE.NumberKeyframeTrack(
                    `.morphTargetInfluences[${idx}]`, times, values, THREE.InterpolateLinear
                ));
            }
        });

        // 返回 Clip 和 TimeMap
        return {
            clip: new THREE.AnimationClip('MandarinSpeech', totalTime, tracks),
            duration: totalTime,
            timeMap: timeMap
        };
    }

    // --- 7. UI 事件 ---
    const btn = document.getElementById('speakBtn');
    const input = document.getElementById('textInput');
    const syncIndicator = document.getElementById('sync-indicator');

    document.getElementById('speedSlider').addEventListener('input', (e) => { CONFIG.speedMult = parseFloat(e.target.value); document.getElementById('speedDisplay').innerText = CONFIG.speedMult.toFixed(1) + "x"; });
    document.getElementById('ampSlider').addEventListener('input', (e) => { CONFIG.ampMult = parseFloat(e.target.value); document.getElementById('ampDisplay').innerText = CONFIG.ampMult.toFixed(1) + "x"; });

    // 眨眼
    const blinkState = { val: 0, isBlinking: false, nextTime: 2 };
    function updateBlink(dt) {
        if (!headMesh) return;
        const idxL = headMesh.morphTargetDictionary['eyeBlinkLeft'];
        const idxR = headMesh.morphTargetDictionary['eyeBlinkRight'];
        if (!idxL) return;
        if (blinkState.isBlinking) {
            blinkState.val += 0.15;
            if (blinkState.val >= 1) { blinkState.val = 1; blinkState.isBlinking = false; }
        } else if (blinkState.val > 0) { blinkState.val -= 0.1; }
        else {
            blinkState.nextTime -= dt;
            if (blinkState.nextTime <= 0) { blinkState.isBlinking = true; blinkState.nextTime = 2 + Math.random() * 3; }
        }
        headMesh.morphTargetInfluences[idxL] = Math.max(0, blinkState.val);
        headMesh.morphTargetInfluences[idxR] = Math.max(0, blinkState.val);
    }

    btn.addEventListener('click', () => {
        if (!faceMixer) return;
        const text = input.value;
        const animData = generateMandarinAnim(text);
        if (!animData) return;

        btn.disabled = true;
        syncIndicator.classList.add('active'); // 亮灯

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.0;
        const selectedVoiceIndex = document.getElementById('voiceSelect').value;
        if (selectedVoiceIndex !== "" && availableVoices[selectedVoiceIndex]) utterance.voice = availableVoices[selectedVoiceIndex];

        const action = faceMixer.clipAction(animData.clip);
        action.setLoop(THREE.LoopOnce);
        action.clampWhenFinished = true;

        faceMixer.stopAllAction();
        action.reset();

        // *** 核心：事件驱动同步 (Event Driven Sync) ***

        // 1. 开始事件：启动动画
        utterance.onstart = () => {
            // 微小延迟消除启动误差
            setTimeout(() => action.play(), 50);
        };

        // 2. 边界事件：实时校准
        // 当 TTS 读到第 N 个字时，onboundary 会触发，并给我们 charIndex
        utterance.onboundary = (event) => {
            const index = event.charIndex;
            // 查找这个字在我们预设动画里的开始时间
            const targetTime = animData.timeMap[index];

            if (targetTime !== undefined && targetTime !== null) {
                // 如果当前动画时间偏差超过了 0.1秒，强制校准
                // 这样既保证了同步，又不会因为频繁细微调整导致抖动
                if (Math.abs(action.time - targetTime) > 0.1) {
                    console.log(`Syncing: char[${index}] -> time ${targetTime}`);
                    action.time = targetTime;
                }
            }
        };

        utterance.onend = () => {
            btn.disabled = false;
            syncIndicator.classList.remove('active');
            action.fadeOut(0.5);
        };
        utterance.onerror = () => { btn.disabled = false; syncIndicator.classList.remove('active'); };

        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    });

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if (bodyMixer) bodyMixer.update(delta);
        if (faceMixer) faceMixer.update(delta);
        updateBlink(delta);
        controls.update();
        if (headMesh && teethMesh) {
             for (let i = 0; i < headMesh.morphTargetInfluences.length; i++) {
                 teethMesh.morphTargetInfluences[i] = headMesh.morphTargetInfluences[i];
            }
        }
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
