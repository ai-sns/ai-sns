<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Text Driven + Virtual Energy Sync</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Microsoft YaHei', sans-serif; color: white; }

        #ui-wrapper {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px;
            display: flex; flex-direction: column; gap: 15px;
            background: rgba(0,0,0,0.85); padding: 25px;
            border-radius: 16px; backdrop-filter: blur(12px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
        }

        .visualizer-box {
            background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px;
            display: flex; flex-direction: column; gap: 5px;
        }
        .label { font-size: 12px; color: #aaa; display: flex; justify-content: space-between;}

        /* 模拟的能量条 */
        .bar-container { height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
        #energy-bar { height: 100%; width: 0%; background: #00ffaa; transition: width 0.05s linear; }

        .status-text { font-family: monospace; color: #ffeb3b; font-size: 14px; min-height: 20px;}

        textarea {
            width: 100%; height: 60px; background: #333; color: white; border: 1px solid #555;
            border-radius: 6px; padding: 10px; font-family: sans-serif; resize: none; font-size: 14px;
        }
        textarea:focus { border-color: #00c6ff; outline: none; }

        button {
            padding: 12px; font-size: 16px; font-weight: 600; border: none; border-radius: 8px;
            cursor: pointer; background: linear-gradient(135deg, #00c6ff, #0072ff); color: white;
            transition: transform 0.1s; width: 100%;
        }
        button:active { transform: scale(0.96); }
        button:disabled { background: #555; opacity: 0.7; cursor: not-allowed; }

        .control-row { display: flex; gap: 10px; }
        select { flex: 1; padding: 8px; background: #333; color: white; border: 1px solid #555; border-radius: 6px; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://unpkg.com/pinyin-pro@3.18.3/dist/index.js"></script>
</head>
<body>

<div id="ui-wrapper">
    <div class="visualizer-box">
        <div class="label">
            <span>虚拟声能 (Virtual Energy)</span>
            <span id="current-word">-</span>
        </div>
        <div class="bar-container"><div id="energy-bar"></div></div>
    </div>

    <textarea id="textInput">你好，我是你的数字人。我不听麦克风，我直接监听文本的节奏。</textarea>

    <div class="control-row">
        <select id="voiceSelect"><option>加载声音...</option></select>
        <button id="speakBtn">▶️ 播放并驱动</button>
    </div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- 1. 映射表 (普通话) ---
    const INITIALS_MAP = {
        'b': { jawOpen: 0, mouthClose: 0.3 }, 'p': { jawOpen: 0, mouthClose: 0.35 }, 'm': { jawOpen: 0, mouthClose: 0.3 },
        'f': { jawOpen: 0.05, mouthShrugLower: 0.2 }, 'l': { jawOpen: 0.12 }, 'n': { jawOpen: 0.1 },
        'h': { jawOpen: 0.1 }, 'r': { jawOpen: 0.1, mouthFunnel: 0.15 },
        'zh': { jawOpen: 0.08, mouthFunnel: 0.15 }, 'ch': { jawOpen: 0.08, mouthFunnel: 0.15 }, 'sh': { jawOpen: 0.08, mouthFunnel: 0.15 },
        'j': { jawOpen: 0.05, mouthSmile: 0.2 }, 'q': { jawOpen: 0.05, mouthSmile: 0.2 }, 'x': { jawOpen: 0.05, mouthSmile: 0.2 },
        'g': { jawOpen: 0.1 }, 'k': { jawOpen: 0.1 }, 'd': { jawOpen: 0.05 }, 't': { jawOpen: 0.05 },
        'sil': { jawOpen: 0, mouthClose: 0.1 } // 停顿
    };
    const FINALS_MAP = {
        'a': { jawOpen: 0.25 }, 'o': { jawOpen: 0.20, mouthFunnel: 0.4 }, 'e': { jawOpen: 0.15, mouthSmile: 0.15 },
        'i': { jawOpen: 0.10, mouthSmile: 0.25 }, 'u': { jawOpen: 0.08, mouthPucker: 0.55 }, 'v': { jawOpen: 0.08, mouthPucker: 0.6 },
        'ai': { jawOpen: 0.22, mouthSmile: 0.15 }, 'ao': { jawOpen: 0.22, mouthFunnel: 0.2 }, 'ou': { jawOpen: 0.15, mouthPucker: 0.4 },
        'an': { jawOpen: 0.22 }, 'ang': { jawOpen: 0.25 }, 'er': { jawOpen: 0.15, mouthShrugLower: 0.2 },
        'sil': { jawOpen: 0, mouthClose: 0.1 }
    };
    const DEFAULT_SHAPE = { jawOpen: 0.02, mouthClose: 0.05 };

    // --- 2. 场景标准初始化 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.62, 0.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.58, 0);
    controls.enablePan = true; controls.enableDamping = true;
    controls.update();

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(-1, 2, 3); scene.add(dirLight);
    const rimLight = new THREE.DirectionalLight(0x00c6ff, 2.0);
    rimLight.position.set(2, 2, -1.5); scene.add(rimLight);

    let headMesh, teethMesh, bodyMixer;
    const clock = new THREE.Clock();

    const loader = new GLTFLoader();
    loader.load('./officeyoumanblue_0_0_0_0_1_0.glb', (gltf) => {
        const model = gltf.scene;
        scene.add(model);
        if (gltf.animations.length > 0) {
            bodyMixer = new THREE.AnimationMixer(model);
            const action = bodyMixer.clipAction(gltf.animations[0]);
            action.play(); action.timeScale = 0.5;
        }
        model.traverse(child => {
            if (child.isMesh && child.morphTargetDictionary) {
                if (child.name === 'Wolf3D_Head') headMesh = child;
                if (child.name === 'Wolf3D_Teeth') teethMesh = child;
            }
        });
    });

    // --- 3. 语音配置 ---
    let availableVoices = [];
    const voiceSelect = document.getElementById('voiceSelect');
    function loadVoices() {
        const allVoices = window.speechSynthesis.getVoices();
        availableVoices = allVoices.filter(v => v.lang.includes('zh') || v.name.includes('Chinese'));
        if (availableVoices.length === 0) availableVoices = allVoices;
        voiceSelect.innerHTML = '';
        availableVoices.forEach((voice, index) => {
            const option = document.createElement('option');
            option.value = index;
            option.textContent = `${voice.name}`;
            voiceSelect.appendChild(option);
        });
        const defaultIndex = availableVoices.findIndex(v => v.name.includes('Kangkang') || v.name.includes('Male'));
        if (defaultIndex !== -1) voiceSelect.value = defaultIndex;
    }
    loadVoices();
    if (window.speechSynthesis.onvoiceschanged !== undefined) window.speechSynthesis.onvoiceschanged = loadVoices;

    // --- 4. 核心：虚拟信号驱动逻辑 ---

    // 全局状态
    let speakingData = [];   // 存储每个字的口型定义
    let activeIndex = -1;    // 当前读到第几个字
    let virtualEnergy = 0;   // 模拟的音量能量 (0.0 ~ 1.0)
    let isSpeaking = false;

    // 预处理文本：生成口型队列
    function prepareText(text) {
        const { pinyin } = window.pinyinPro;
        // 使用逐字模式，确保和 TTS 的 charIndex 对齐
        const pinyinArray = pinyin(text, { type: 'array', toneType: 'none', nonZh: 'consecutive' });

        speakingData = pinyinArray.map((py, i) => {
            // 标点符号 -> 静音
            if (!/^[a-z]+$/.test(py)) return { shape: INITIALS_MAP['sil'], char: text[i] };

            let initial = '', final = py;
            const doubleInitials = ['zh', 'ch', 'sh'];
            if (doubleInitials.some(di => py.startsWith(di))) { initial = py.substring(0, 2); final = py.substring(2); }
            else {
                const singleInitials = ['b','p','m','f','d','t','n','l','g','k','h','j','q','x','r','z','c','s','w','y'];
                if (singleInitials.includes(py[0])) { initial = py[0]; final = py.substring(1); }
            }
            if (['j','q','x','y'].includes(initial) && final.startsWith('u')) final = final.replace('u', 'v');

            const initShape = INITIALS_MAP[initial] || {};
            const finalShape = FINALS_MAP[final] || FINALS_MAP[final[0]] || {};

            // 合并声韵母，韵母权重稍大
            const combinedShape = { ...DEFAULT_SHAPE, ...initShape, ...finalShape };
            return { shape: combinedShape, char: text[i] };
        });
    }

    const btn = document.getElementById('speakBtn');

    btn.addEventListener('click', () => {
        const text = document.getElementById('textInput').value;
        if(!text) return;

        prepareText(text); // 1. 解析文本

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.0;
        const selectedVoiceIndex = voiceSelect.value;
        if (selectedVoiceIndex !== "" && availableVoices[selectedVoiceIndex]) utterance.voice = availableVoices[selectedVoiceIndex];

        // 2. 监听边界事件 -> 驱动虚拟能量
        utterance.onboundary = (event) => {
            // event.charIndex 告诉我们要读第几个字了
            // 注意：有些浏览器 charIndex 并不精准对应数组索引，这里简化处理
            // 对于中文，charIndex 通常就是字符索引
            activeIndex = event.charIndex;

            // *** 关键：模拟能量爆发 ***
            // 每当读一个新字，能量瞬间充满
            virtualEnergy = 1.0;

            // 更新UI
            if(speakingData[activeIndex]) {
                document.getElementById('current-word').innerText = speakingData[activeIndex].char;
            }
        };

        utterance.onstart = () => {
            isSpeaking = true;
            activeIndex = 0;
            btn.disabled = true;
            btn.innerText = "🔊 正在播放...";
        };

        utterance.onend = () => {
            isSpeaking = false;
            virtualEnergy = 0;
            activeIndex = -1;
            btn.disabled = false;
            btn.innerText = "▶️ 播放并驱动";
            document.getElementById('current-word').innerText = "-";
        };

        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    });

    // --- 5. 渲染循环 ---
    let currentMorphs = {}; // 当前平滑后的权重

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if (bodyMixer) bodyMixer.update(delta);

        // --- 驱动逻辑 ---
        if (isSpeaking && activeIndex >= 0 && activeIndex < speakingData.length) {
            // A. 能量自然衰减 (模拟发音的 ADSR 包络)
            // 能量从 1.0 慢慢降到 0.0，模拟说话时的气流减弱
            virtualEnergy -= delta * 3.5; // 调节衰减速度
            if (virtualEnergy < 0) virtualEnergy = 0;

            // B. 获取当前字的口型目标
            const targetData = speakingData[activeIndex];
            const targetShape = targetData.shape;

            // C. 应用到模型
            // 核心公式：最终形状 = 目标形状 * 虚拟能量
            // 这样字刚开始读时嘴张得大，读完了嘴自然闭上
            if (headMesh) {
                const dict = headMesh.morphTargetDictionary;

                // 收集所有需要更新的 key
                const allKeys = new Set([...Object.keys(currentMorphs), ...Object.keys(targetShape)]);

                allKeys.forEach(key => {
                    const idx = dict[key];
                    if (idx === undefined) return;

                    // 目标值：如果能量为0，目标就是0（闭嘴）
                    // 加上一个基础值 0.1 * virtualEnergy，保证即使 target 是 0 也有点动静? 不，保持干净比较好
                    let targetVal = (targetShape[key] || 0) * (0.2 + 0.8 * virtualEnergy);

                    // 特殊处理闭嘴音：闭嘴音(mouthClose) 不需要乘能量，反而能量越大越要闭紧?
                    // 简化处理：所有参数都乘能量，这样没能量时自然归零(也就是自然闭嘴)

                    // D. 平滑插值 (Lerp)
                    const currentVal = headMesh.morphTargetInfluences[idx];
                    const smoothSpeed = 15.0; // 响应速度
                    const nextVal = currentVal + (targetVal - currentVal) * delta * smoothSpeed;

                    headMesh.morphTargetInfluences[idx] = nextVal;

                    // 记录状态
                    if (nextVal > 0.001) currentMorphs[key] = nextVal;
                    else delete currentMorphs[key];
                });
            }

            // 更新 UI 条
            document.getElementById('energy-bar').style.width = (virtualEnergy * 100) + '%';
        } else {
            // 不说话时，缓慢归零
            if (headMesh) {
                const dict = headMesh.morphTargetDictionary;
                for(let key in currentMorphs) {
                    const idx = dict[key];
                    headMesh.morphTargetInfluences[idx] *= (1 - delta * 10);
                    if(headMesh.morphTargetInfluences[idx] < 0.001) delete currentMorphs[key];
                }
            }
            document.getElementById('energy-bar').style.width = '0%';
        }

        // 牙齿同步
        if (headMesh && teethMesh) {
             for (let i = 0; i < headMesh.morphTargetInfluences.length; i++) {
                 teethMesh.morphTargetInfluences[i] = headMesh.morphTargetInfluences[i];
            }
        }

        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
