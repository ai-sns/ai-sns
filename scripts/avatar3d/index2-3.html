<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RPM Animation + Lip Sync</title>
    <style>
        body { margin: 0; overflow: hidden; background: #333; }
        #btn-container {
            position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none;
        }
        button {
            pointer-events: auto; padding: 12px 24px; font-size: 18px;
            background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:active { background: #45a049; transform: translateY(2px); }
    </style>
    <!-- Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

<div id="btn-container">
    <button id="sayBtn">Say "Hello World"</button>
</div>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- 场景初始化 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.6, 1.5); // 相机位置

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.5, 0); // 看着头部位置
    controls.update();

    // 灯光
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(1, 2, 3);
    scene.add(dirLight);

    // --- 变量 ---
    let faceMixer = null; // 专门控制脸（说话）
    let bodyMixer = null; // 专门控制身体（自带动作）

    let headMesh = null;
    let teethMesh = null;
    const clock = new THREE.Clock();

    // --- 优化的口型时间轴 (自然版) ---
    const speechTimeline = [
        { time: 0.0, morphs: {} },
        // HELLO
        { time: 0.1, morphs: { jawOpen: 0.1, mouthShrugUpper: 0.15 } },
        { time: 0.2, morphs: { jawOpen: 0.25, mouthLowerDownLeft: 0.3, mouthLowerDownRight: 0.3, mouthSmileLeft: 0.15, mouthSmileRight: 0.15 } },
        { time: 0.35, morphs: { jawOpen: 0.15, mouthShrugLower: 0.5 } },
        { time: 0.5, morphs: { jawOpen: 0.25, mouthFunnel: 0.6, mouthPucker: 0.1 } },
        // WORLD (幅度减小)
        { time: 0.65, morphs: { jawOpen: 0.05, mouthPucker: 0.55, mouthFunnel: 0.1 } }, // W
        { time: 0.8, morphs: { jawOpen: 0.15, mouthFunnel: 0.25, mouthShrugLower: 0.2, mouthPucker: 0.2 } }, // R
        { time: 0.9, morphs: { jawOpen: 0.15, mouthShrugLower: 0.3 } }, // L
        { time: 1.0, morphs: { jawOpen: 0.02, mouthClose: 0.1 } }, // D
        // END
        { time: 1.2, morphs: {} }
    ];

    // --- 加载模型 ---
    const loader = new GLTFLoader();
    // 请替换为你的 GLB 路径
    loader.load('./officeyoumanblue_0_0_0_0_1_0.glb', (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        // --- 1. 处理自带的身体动作 ---
        if (gltf.animations && gltf.animations.length > 0) {
            console.log(`发现 ${gltf.animations.length} 个自带动作`);

            // 创建控制整个模型的 Mixer
            bodyMixer = new THREE.AnimationMixer(model);

            // 播放第一个动作 (索引 0)
            const clip = gltf.animations[0];
            const action = bodyMixer.clipAction(clip);
            action.play(); // 默认循环播放
        } else {
            console.warn("GLB 文件中没有自带动作");
        }

        // --- 2. 寻找头部网格用于口型 ---
        model.traverse((child) => {
            if (child.isMesh && child.morphTargetDictionary) {
                if (child.name === 'Wolf3D_Head') headMesh = child;
                if (child.name === 'Wolf3D_Teeth') teethMesh = child;
            }
        });

        if (headMesh) {
            // 创建专门控制头部的 Mixer
            faceMixer = new THREE.AnimationMixer(headMesh);
        }
    });

    // --- 生成口型 Clip ---
    function createSpeechClip(timeline) {
        if (!headMesh) return null;
        const dictionary = headMesh.morphTargetDictionary;
        const tracks = [];
        const usedMorphs = new Set();

        timeline.forEach(kf => Object.keys(kf.morphs).forEach(key => usedMorphs.add(key)));

        usedMorphs.forEach(morphName => {
            const index = dictionary[morphName];
            if (index === undefined) return;
            const times = [], values = [];
            timeline.forEach(kf => {
                times.push(kf.time);
                values.push(kf.morphs[morphName] || 0);
            });
            tracks.push(new THREE.NumberKeyframeTrack(`.morphTargetInfluences[${index}]`, times, values));
        });

        if (tracks.length === 0) return null;
        return new THREE.AnimationClip('SpeakHello', -1, tracks);
    }

    // --- 按钮事件 ---
    document.getElementById('sayBtn').addEventListener('click', () => {
        if (!faceMixer || !headMesh) return;

        const clip = createSpeechClip(speechTimeline);
        if (!clip) return;

        // 播放声音
        const utterance = new SpeechSynthesisUtterance("Hello World");
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);

        // 播放口型动画
        const action = faceMixer.clipAction(clip);
        action.setLoop(THREE.LoopOnce);
        action.clampWhenFinished = true;

        faceMixer.stopAllAction(); // 只停止脸部的旧动作，不影响身体
        action.reset();
        action.play();

        const cleanup = () => {
             setTimeout(() => {
                headMesh.morphTargetInfluences.fill(0);
                if(teethMesh) teethMesh.morphTargetInfluences.fill(0);
             }, 100);
             faceMixer.removeEventListener('finished', cleanup);
        };
        faceMixer.addEventListener('finished', cleanup);
    });

    // --- 渲染循环 ---
    function animate() {
        requestAnimationFrame(animate);

        // 获取两帧之间的时间间隔
        const delta = clock.getDelta();

        // 1. 更新身体动作 (Idle/Walking)
        if (bodyMixer) bodyMixer.update(delta);

        // 2. 更新面部口型
        if (faceMixer) faceMixer.update(delta);

        // 3. 手动同步牙齿 (因为 faceMixer 只驱动 Head)
        if (headMesh && teethMesh) {
            if (teethMesh.morphTargetInfluences.length === headMesh.morphTargetInfluences.length) {
                for (let i = 0; i < headMesh.morphTargetInfluences.length; i++) {
                     teethMesh.morphTargetInfluences[i] = headMesh.morphTargetInfluences[i];
                }
            }
        }

        renderer.render(scene, camera);
    }
    animate();

    // Resize handler
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
