<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hello World with Micro-Expressions</title>
    <style>
        body { margin: 0; overflow: hidden; background: #2a2a2a; }
        #btn-container {
            position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none;
        }
        button {
            pointer-events: auto; padding: 12px 24px; font-size: 18px; font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 25px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

<div id="btn-container">
    <button id="sayBtn">Say "Hello World"</button>
</div>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- 1. 场景设置 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x2a2a2a); // 深灰色背景更显质感

    // 增加一点环境雾，让渲染更柔和
    scene.fog = new THREE.Fog(0x2a2a2a, 2, 10);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.65, 1.1); // 近距离特写

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.6, 0);
    controls.enablePan = false;
    controls.update();

    // 灯光布局 (影棚光)
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(-1, 2, 3);
    scene.add(keyLight);

    const rimLight = new THREE.DirectionalLight(0xffaa00, 1.0); // 暖色背光
    rimLight.position.set(2, 2, -2);
    scene.add(rimLight);

    // --- 2. 变量定义 ---
    let faceMixer = null;
    let bodyMixer = null;
    let headMesh = null;
    let teethMesh = null;
    const clock = new THREE.Clock();

    // 眨眼控制变量
    const blinkState = {
        isBlinking: false,
        eyeBlinkValue: 0,
        blinkSpeed: 0.1,
        nextBlinkTime: 0
    };

    // --- 3. 带有微表情的时间轴 ---
    // 除了口型，我们加入了 browInnerUp (扬眉), eyeSquint (眯眼微笑), cheekSquint (提肌)
    const speechTimeline = [
        { time: 0.0, morphs: {} },

        // --- HELLO (配合扬眉，表示欢迎) ---
        { time: 0.1, morphs: {
            jawOpen: 0.1, mouthShrugUpper: 0.15,
            browInnerUp: 0.5, // <--- 微表情：眉头上扬
            browOuterUpLeft: 0.2, browOuterUpRight: 0.2
        }},
        { time: 0.2, morphs: {
            jawOpen: 0.25, mouthLowerDownLeft: 0.3, mouthLowerDownRight: 0.3, mouthSmileLeft: 0.3, mouthSmileRight: 0.3, // 加大一点微笑
            browInnerUp: 0.6, // 保持扬眉
            cheekSquintLeft: 0.3, cheekSquintRight: 0.3 // <--- 微表情：脸颊上提（真诚微笑的标志）
        }},
        { time: 0.35, morphs: {
            jawOpen: 0.15, mouthShrugLower: 0.5,
            browInnerUp: 0.4
        }},
        { time: 0.5, morphs: {
            jawOpen: 0.25, mouthFunnel: 0.6, mouthPucker: 0.1,
            browInnerUp: 0.2 // 眉毛开始回落
        }},

        // --- WORLD (配合眯眼，表示专注/深情) ---
        { time: 0.65, morphs: {
            jawOpen: 0.05, mouthPucker: 0.55, mouthFunnel: 0.1,
            eyeSquintLeft: 0.4, eyeSquintRight: 0.4 // <--- 微表情：眯眼
        }},
        { time: 0.8, morphs: {
            jawOpen: 0.15, mouthFunnel: 0.25, mouthShrugLower: 0.2, mouthPucker: 0.2,
            eyeSquintLeft: 0.3, eyeSquintRight: 0.3
        }},
        { time: 0.9, morphs: {
            jawOpen: 0.15, mouthShrugLower: 0.3,
            eyeSquintLeft: 0.1, eyeSquintRight: 0.1
        }},
        { time: 1.0, morphs: {
            jawOpen: 0.02, mouthClose: 0.1,
            browInnerUp: 0, eyeSquintLeft: 0, eyeSquintRight: 0 // 表情归零
        }},

        { time: 1.2, morphs: {} }
    ];

    // --- 4. 加载 GLB ---
    const loader = new GLTFLoader();
    const modelUrl = './officeyoumanblue_0_0_0_0_1_0.glb'; // 你的文件名

    loader.load(modelUrl, (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        // 启用阴影
        model.traverse(o => {
            if (o.isMesh) {
                o.castShadow = true;
                o.receiveShadow = true;
            }
        });

        // 4.1 处理身体动画 (Idle)
        if (gltf.animations.length > 0) {
            bodyMixer = new THREE.AnimationMixer(model);
            const action = bodyMixer.clipAction(gltf.animations[0]);
            action.play();
            // 让身体动作稍微慢一点，看起来更沉稳
            action.timeScale = 0.8;
        }

        // 4.2 寻找头部和牙齿
        model.traverse((child) => {
            if (child.isMesh && child.morphTargetDictionary) {
                if (child.name === 'Wolf3D_Head') headMesh = child;
                if (child.name === 'Wolf3D_Teeth') teethMesh = child;
            }
        });

        if (headMesh) {
            faceMixer = new THREE.AnimationMixer(headMesh);
        }
    });

    // --- 5. 工具函数 ---

    // 生成动画 Clip
    function createExpressionClip(timeline) {
        if (!headMesh) return null;
        const dictionary = headMesh.morphTargetDictionary;
        const tracks = [];
        const usedMorphs = new Set();

        // 收集所有用到的 morph
        timeline.forEach(kf => Object.keys(kf.morphs).forEach(key => usedMorphs.add(key)));

        usedMorphs.forEach(morphName => {
            const index = dictionary[morphName];
            if (index === undefined) return;

            const times = [], values = [];
            timeline.forEach(kf => {
                times.push(kf.time);
                values.push(kf.morphs[morphName] || 0);
            });

            // 使用 CatmullRom 插值让微表情过渡更平滑
            const track = new THREE.NumberKeyframeTrack(`.morphTargetInfluences[${index}]`, times, values);
            tracks.push(track);
        });

        return new THREE.AnimationClip('Expression', -1, tracks);
    }

    // 独立的眨眼逻辑 (Procedural Animation)
    function updateBlink(delta) {
        if (!headMesh) return;
        const idxLeft = headMesh.morphTargetDictionary['eyeBlinkLeft'];
        const idxRight = headMesh.morphTargetDictionary['eyeBlinkRight'];

        if (idxLeft === undefined || idxRight === undefined) return;

        // 简单的状态机
        if (blinkState.isBlinking) {
            // 正在闭眼或睁眼
            blinkState.eyeBlinkValue += blinkState.blinkSpeed;
            if (blinkState.eyeBlinkValue >= 1) {
                blinkState.eyeBlinkValue = 1;
                blinkState.blinkSpeed = -0.08; // 快速闭眼，稍微慢一点睁眼
            } else if (blinkState.eyeBlinkValue <= 0) {
                blinkState.eyeBlinkValue = 0;
                blinkState.isBlinking = false;
                blinkState.blinkSpeed = 0.15;
                // 随机下一次眨眼时间 (2~5秒后)
                blinkState.nextBlinkTime = clock.elapsedTime + 2 + Math.random() * 3;
            }
        } else {
            // 等待下一次眨眼
            if (clock.elapsedTime > blinkState.nextBlinkTime) {
                blinkState.isBlinking = true;
            }
        }

        // 应用眨眼值 (注意：如果 faceMixer 里没有 eyeBlink 的轨道，这个赋值是安全的)
        // 我们在 speechTimeline 里故意没有加 eyeBlink，就是为了让这个逻辑独立运行
        headMesh.morphTargetInfluences[idxLeft] = blinkState.eyeBlinkValue;
        headMesh.morphTargetInfluences[idxRight] = blinkState.eyeBlinkValue;
    }

    // --- 6. 交互 ---
    document.getElementById('sayBtn').addEventListener('click', () => {
        if (!faceMixer || !headMesh) return;

        const clip = createExpressionClip(speechTimeline);
        if (!clip) return;

        // TTS
        const utterance = new SpeechSynthesisUtterance("Hello World");
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);

        // 播放面部动画
        const action = faceMixer.clipAction(clip);
        action.setLoop(THREE.LoopOnce);
        action.clampWhenFinished = true;

        faceMixer.stopAllAction();
        action.reset();
        action.play();

        // 动画结束后清理
        const cleanup = () => {
             // 缓慢归零所有表情 (除了眨眼)
             const duration = 0.5;
             const startValues = [...headMesh.morphTargetInfluences];
             let t = 0;

             const fadeOut = () => {
                 t += 0.02;
                 if (t > 1) {
                     // 彻底重置 (保留眨眼逻辑控制的)
                     return;
                 }

                 // 这是一个手动 FadeOut，为了让表情消失得不突兀
                 // 我们只清理 speechTimeline 里涉及的 key
                 // 简单起见，这里我们依赖 faceMixer 的 stop，
                 // 下面的逻辑仅作为保险：
                 if(!blinkState.isBlinking) { // 避免打断眨眼
                     // 实际应用中，mixer stop 后通常会停在最后一帧
                     // 我们这里简单让 mixer 自然结束即可
                 }
                 requestAnimationFrame(fadeOut);
             };
             fadeOut();

             faceMixer.removeEventListener('finished', cleanup);
        };
        faceMixer.addEventListener('finished', cleanup);
    });

    // --- 7. 循环 ---
    function animate() {
        requestAnimationFrame(animate);

        const delta = clock.getDelta();

        // 1. 身体骨骼动画
        if (bodyMixer) bodyMixer.update(delta);

        // 2. 面部表情动画 (Timeline script)
        if (faceMixer) faceMixer.update(delta);

        // 3. 独立眨眼动画 (Procedural)
        updateBlink(delta);

        // 4. 同步牙齿
        if (headMesh && teethMesh) {
            // 复制所有 influence
            for (let i = 0; i < headMesh.morphTargetInfluences.length; i++) {
                 teethMesh.morphTargetInfluences[i] = headMesh.morphTargetInfluences[i];
            }
        }

        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
