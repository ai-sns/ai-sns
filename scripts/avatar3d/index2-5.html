<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Natural Micro-Expressions</title>
    <style>
        body { margin: 0; overflow: hidden; background: #2a2a2a; }
        #btn-container {
            position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none;
        }
        button {
            pointer-events: auto; padding: 12px 24px; font-size: 16px; font-weight: 500;
            background: #555; color: white; border: 1px solid #777; border-radius: 4px; cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #666; }
        button:active { background: #444; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

<div id="btn-container">
    <button id="sayBtn">Say "Hello World" (Natural)</button>
</div>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- 1. 场景设置 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x2a2a2a);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.65, 1.1);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.6, 0);
    controls.enablePan = false;
    controls.update();

    // 灯光 (保持柔和)
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(1, 2, 3);
    scene.add(dirLight);

    // --- 2. 变量 ---
    let faceMixer = null;
    let bodyMixer = null;
    let headMesh = null;
    let teethMesh = null;
    const clock = new THREE.Clock();

    const blinkState = {
        isBlinking: false,
        eyeBlinkValue: 0,
        blinkSpeed: 0.12,
        nextBlinkTime: 0
    };

    // --- 3. 极简自然风格时间轴 (Subtle Timeline) ---
    // 核心思路：大部分动作幅度都在 0.1 ~ 0.3 之间
    const speechTimeline = [
        { time: 0.0, morphs: {} },

        // --- HELLO ---
        // H: 几乎不动，稍微提一点上唇
        { time: 0.1, morphs: {
            jawOpen: 0.05, mouthShrugUpper: 0.1,
            browInnerUp: 0.2, // 扬眉从 0.5 降到 0.2 (非常微小)
        }},

        // E: 嘴角微微一动，而不是大笑
        { time: 0.2, morphs: {
            jawOpen: 0.15, // 张嘴幅度减半
            mouthLowerDownLeft: 0.2, mouthLowerDownRight: 0.2,
            mouthSmileLeft: 0.15, mouthSmileRight: 0.15, // 微笑降到 0.15
            browInnerUp: 0.25,
            cheekSquintLeft: 0.15, cheekSquintRight: 0.15 // 苹果肌轻微联动
        }},

        // L: 舌头动作，下颚微收
        { time: 0.35, morphs: {
            jawOpen: 0.1, mouthShrugLower: 0.4,
            browInnerUp: 0.15
        }},

        // O: 嘴形收圆，但不要变成圆环
        { time: 0.5, morphs: {
            jawOpen: 0.15, mouthFunnel: 0.3, mouthPucker: 0.05, // Funnel 从 0.6 降到 0.3
            browInnerUp: 0.05
        }},

        // --- WORLD ---
        // W: 这是一个容易夸张的音，我们把它压得很低
        { time: 0.65, morphs: {
            jawOpen: 0.02, // 几乎闭嘴
            mouthPucker: 0.35, // 嘟嘴从 0.55 降到 0.35
            mouthFunnel: 0.1,
            eyeSquintLeft: 0.2, eyeSquintRight: 0.2 // 眯眼从 0.4 降到 0.2
        }},

        // R: 过渡音
        { time: 0.8, morphs: {
            jawOpen: 0.1, mouthFunnel: 0.2, mouthPucker: 0.15,
            eyeSquintLeft: 0.15, eyeSquintRight: 0.15
        }},

        // L: 再次提下唇
        { time: 0.9, morphs: {
            jawOpen: 0.1, mouthShrugLower: 0.25,
            eyeSquintLeft: 0.05, eyeSquintRight: 0.05
        }},

        // D: 结尾轻闭
        { time: 1.0, morphs: {
            jawOpen: 0.0, mouthClose: 0.05,
            browInnerUp: 0, eyeSquintLeft: 0, eyeSquintRight: 0
        }},

        { time: 1.2, morphs: {} }
    ];

    // --- 4. 加载 ---
    const loader = new GLTFLoader();
    // 你的文件
    const modelUrl = './tshirtgirl_0_0_0_0_1_0.glb';//tshirtgirl_0_0_0_0_1_0.glb,officeyoumanblue_0_0_0_0_1_0.glb

    loader.load(modelUrl, (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        // 身体 Idle 动画
        if (gltf.animations.length > 0) {
            bodyMixer = new THREE.AnimationMixer(model);
            const action = bodyMixer.clipAction(gltf.animations[0]);
            action.play();
            // 降低身体晃动的频率，让它看起来更稳重
            action.timeScale = 0.7;
            // 降低身体动作的幅度 (如果动作太大的话，通过 weight 控制)
            action.weight = 0.8;
        }

        model.traverse((child) => {
            if (child.isMesh && child.morphTargetDictionary) {
                if (child.name === 'Wolf3D_Head') headMesh = child;
                if (child.name === 'Wolf3D_Teeth') teethMesh = child;
            }
        });

        if (headMesh) faceMixer = new THREE.AnimationMixer(headMesh);
    });

    // --- 5. 动画逻辑 ---

    function createExpressionClip(timeline) {
        if (!headMesh) return null;
        const dictionary = headMesh.morphTargetDictionary;
        const tracks = [];
        const usedMorphs = new Set();

        timeline.forEach(kf => Object.keys(kf.morphs).forEach(key => usedMorphs.add(key)));

        usedMorphs.forEach(morphName => {
            const index = dictionary[morphName];
            if (index === undefined) return;

            const times = [], values = [];
            timeline.forEach(kf => {
                times.push(kf.time);
                values.push(kf.morphs[morphName] || 0);
            });

            // 使用线性插值 (Linear) 而不是 CatmullRom，有时对于微小动作更稳定，不会产生过冲
            const track = new THREE.NumberKeyframeTrack(`.morphTargetInfluences[${index}]`, times, values, THREE.InterpolateLinear);
            tracks.push(track);
        });

        return new THREE.AnimationClip('Expression', -1, tracks);
    }

    function updateBlink(delta) {
        if (!headMesh) return;
        const idxLeft = headMesh.morphTargetDictionary['eyeBlinkLeft'];
        const idxRight = headMesh.morphTargetDictionary['eyeBlinkRight'];
        if (idxLeft === undefined) return;

        if (blinkState.isBlinking) {
            blinkState.eyeBlinkValue += blinkState.blinkSpeed;
            if (blinkState.eyeBlinkValue >= 1) {
                blinkState.eyeBlinkValue = 1;
                blinkState.blinkSpeed = -0.12; // 闭眼快，睁眼稍慢
            } else if (blinkState.eyeBlinkValue <= 0) {
                blinkState.eyeBlinkValue = 0;
                blinkState.isBlinking = false;
                blinkState.blinkSpeed = 0.15;
                blinkState.nextBlinkTime = clock.elapsedTime + 2 + Math.random() * 4;
            }
        } else {
            if (clock.elapsedTime > blinkState.nextBlinkTime) blinkState.isBlinking = true;
        }

        headMesh.morphTargetInfluences[idxLeft] = blinkState.eyeBlinkValue;
        headMesh.morphTargetInfluences[idxRight] = blinkState.eyeBlinkValue;
    }

    // --- 6. 事件 ---
    document.getElementById('sayBtn').addEventListener('click', () => {
        if (!faceMixer || !headMesh) return;

        const clip = createExpressionClip(speechTimeline);
        if (!clip) return;

        const utterance = new SpeechSynthesisUtterance("Hello World");
        utterance.rate = 0.95; // 语速正常
        window.speechSynthesis.speak(utterance);

        const action = faceMixer.clipAction(clip);
        action.setLoop(THREE.LoopOnce);
        action.clampWhenFinished = true;

        faceMixer.stopAllAction();
        action.reset();
        action.play();

        const cleanup = () => {
             // 极慢淡出，避免跳变
             const fadeOut = () => {
                 // 简单重置，依靠下一次 update 覆盖
                 // 这里不再手动 fade，让 action 自然停止
             };
             setTimeout(() => {
                // 如果需要强制归零口型（保留眨眼）
                // 遍历 timeline 涉及的 key 归零即可
                // 简单处理：
                speechTimeline.forEach(kf => Object.keys(kf.morphs).forEach(key => {
                     const idx = headMesh.morphTargetDictionary[key];
                     if(idx !== undefined) headMesh.morphTargetInfluences[idx] = 0;
                }));
             }, 1300); // 略晚于 1.2s

             faceMixer.removeEventListener('finished', cleanup);
        };
        faceMixer.addEventListener('finished', cleanup);
    });

    // --- 7. Loop ---
    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        if (bodyMixer) bodyMixer.update(delta);
        if (faceMixer) faceMixer.update(delta);
        updateBlink(delta);

        if (headMesh && teethMesh) {
            for (let i = 0; i < headMesh.morphTargetInfluences.length; i++) {
                 teethMesh.morphTargetInfluences[i] = headMesh.morphTargetInfluences[i];
            }
        }
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
