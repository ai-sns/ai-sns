<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Text to 3D Lip Sync</title>
    <style>
        body { margin: 0; overflow: hidden; background: #2a2a2a; font-family: sans-serif; }

        /* UI 样式 */
        #ui-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px;
            backdrop-filter: blur(5px); width: 80%; max-width: 600px;
        }
        input[type="text"] {
            flex: 1; padding: 10px; border-radius: 5px; border: none; font-size: 16px; outline: none;
            background: rgba(255,255,255,0.9);
        }
        button {
            padding: 10px 25px; font-size: 16px; font-weight: bold; border: none; border-radius: 5px;
            cursor: pointer; background: #667eea; color: white; transition: 0.2s;
        }
        button:hover { background: #5a6fd6; }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

<div id="ui-container">
    <input type="text" id="textInput" placeholder="Type something here (e.g. Hello world, I am alive)..." value="Hello I am your digital avatar">
    <button id="speakBtn">Speak</button>
</div>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- 1. 核心：字符到 ARKit 形态的映射表 (Viseme Map) ---
    // 这里我们将字母归类为发音相似的组，数值保持自然 (0.1 ~ 0.4)
    const VISEMES = {
        // 静止/空格
        'sil': { jawOpen: 0, mouthClose: 0.05 },

        // 元音 (Vowels)
        'a': { jawOpen: 0.2, mouthSmile: 0.1 },
        'e': { jawOpen: 0.15, mouthSmileLeft: 0.2, mouthSmileRight: 0.2, mouthLowerDownLeft: 0.1 },
        'i': { jawOpen: 0.1, mouthSmile: 0.15, mouthStretchLeft: 0.1, mouthStretchRight: 0.1 },
        'o': { jawOpen: 0.15, mouthFunnel: 0.35, mouthPucker: 0.1 },
        'u': { jawOpen: 0.05, mouthPucker: 0.4, mouthFunnel: 0.1 },

        // 唇音 (Lips) - B, P, M 需要闭嘴
        'b': { jawOpen: 0, mouthClose: 0.3 },
        'p': { jawOpen: 0, mouthClose: 0.35, mouthPressLeft: 0.1 },
        'm': { jawOpen: 0, mouthClose: 0.3 },

        // 唇齿音 (Lip-Dental) - F, V
        'f': { jawOpen: 0.05, mouthShrugLower: 0.4, mouthRollLower: 0.2 },
        'v': { jawOpen: 0.05, mouthShrugLower: 0.3, mouthRollLower: 0.1 },

        // 舌尖音 (Tongue) - W, R
        'w': { jawOpen: 0.05, mouthPucker: 0.4 },
        'r': { jawOpen: 0.1, mouthFunnel: 0.2, mouthShrugLower: 0.3 },

        // 齿音 (Teeth) - S, Z, T, D, L, N, K, G...
        's': { jawOpen: 0.05, mouthSmile: 0.1, mouthShrugUpper: 0.1 },
        't': { jawOpen: 0.05, mouthShrugLower: 0.3 }, // 模拟舌头顶牙
        'l': { jawOpen: 0.15, mouthShrugLower: 0.4 }, // 舌头上抬
        'd': { jawOpen: 0.05, mouthShrugLower: 0.3 },
        'k': { jawOpen: 0.15, mouthShrugUpper: 0.1 }, // 喉音
        'g': { jawOpen: 0.15, mouthShrugUpper: 0.1 }
    };

    // 辅助映射：将未定义的字母映射到近似形状
    const CHAR_MAP = {
        'c': 's', 'j': 's', 'z': 's', 'x': 's',
        'q': 'w', 'y': 'i', 'h': 'a', 'n': 'l'
    };

    // --- 2. 场景标准设置 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x2a2a2a);
    scene.fog = new THREE.Fog(0x2a2a2a, 3, 12);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.6, 1.0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.55, 0);
    controls.enablePan = false;
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambientLight);
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.0);
    keyLight.position.set(-1, 2, 3);
    scene.add(keyLight);
    const rimLight = new THREE.DirectionalLight(0xffaa00, 0.8);
    rimLight.position.set(2, 2, -2);
    scene.add(rimLight);

    // --- 3. 变量 ---
    let faceMixer = null;
    let bodyMixer = null;
    let headMesh = null;
    let teethMesh = null;
    const clock = new THREE.Clock();

    // 眨眼状态
    const blinkState = { isBlinking: false, value: 0, speed: 0.12, nextTime: 0 };
    // 说话状态
    let isSpeaking = false;

    // --- 4. 加载模型 ---
    const loader = new GLTFLoader();
    loader.load('./officeyoumanblue_0_0_0_0_1_0.glb', (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        // 身体待机动作
        if (gltf.animations.length > 0) {
            bodyMixer = new THREE.AnimationMixer(model);
            const action = bodyMixer.clipAction(gltf.animations[0]);
            action.play();
            action.timeScale = 0.6; // 慢一点，稳重
            action.weight = 0.8;
        }

        model.traverse((child) => {
            if (child.isMesh && child.morphTargetDictionary) {
                if (child.name === 'Wolf3D_Head') headMesh = child;
                if (child.name === 'Wolf3D_Teeth') teethMesh = child;
            }
        });

        if (headMesh) faceMixer = new THREE.AnimationMixer(headMesh);

        // 移除 loading 状态 (如果有)
        document.getElementById('speakBtn').innerText = "Speak";
    });

    // --- 5. 动态生成动画核心函数 ---

    function generateAnimFromText(text) {
        if (!headMesh) return null;

        // 5.1 文本预处理
        const cleanText = text.toLowerCase().replace(/[^a-z ]/g, '');
        // 预估每个字符的平均时长 (秒)
        // 英语语速大约是每分钟 120-150 词，每个字母大约 0.06 - 0.08 秒
        const charDuration = 0.07;

        const dictionary = headMesh.morphTargetDictionary;
        const tracksData = {}; // 存储 { morphName: { times: [], values: [] } }

        let currentTime = 0;

        // 初始化所有可能的 morph track
        Object.keys(VISEMES).forEach(key => {
            Object.keys(VISEMES[key]).forEach(morph => {
                if (!tracksData[morph]) tracksData[morph] = { times: [], values: [] };
            });
        });

        // 5.2 遍历字符生成关键帧
        for (let i = 0; i < cleanText.length; i++) {
            const char = cleanText[i];

            // 找到对应的形状定义
            let targetMorphs = VISEMES['sil']; // 默认静止
            if (char === ' ') {
                // 空格保持静止
                targetMorphs = VISEMES['sil'];
            } else if (VISEMES[char]) {
                targetMorphs = VISEMES[char];
            } else if (CHAR_MAP[char] && VISEMES[CHAR_MAP[char]]) {
                targetMorphs = VISEMES[CHAR_MAP[char]];
            }

            // 记录关键帧
            // 我们遍历所有已知的 morph 通道，如果当前字符用到了就设值，没用到就归零
            // 这样可以保证口型切换干净
            Object.keys(tracksData).forEach(morphName => {
                const val = targetMorphs[morphName] || 0;

                // 加入一点随机微表情 (Micro-jitter)
                // 如果是 'browInnerUp' 或 'eyeSquint'，我们在说话时随机加一点点
                let jitter = 0;
                if (isSpeaking && Math.random() > 0.7) {
                    if (morphName === 'browInnerUp') jitter = 0.1;
                    if (morphName === 'cheekSquintLeft') jitter = 0.1;
                }

                tracksData[morphName].times.push(currentTime);
                tracksData[morphName].values.push(val + jitter);
            });

            currentTime += charDuration;
        }

        // 结尾归零
        currentTime += 0.1;
        Object.keys(tracksData).forEach(morphName => {
            tracksData[morphName].times.push(currentTime);
            tracksData[morphName].values.push(0);
        });

        // 5.3 转换为 Three.js Tracks
        const tracks = [];
        Object.keys(tracksData).forEach(morphName => {
            const index = dictionary[morphName];
            if (index !== undefined) {
                const track = new THREE.NumberKeyframeTrack(
                    `.morphTargetInfluences[${index}]`,
                    tracksData[morphName].times,
                    tracksData[morphName].values,
                    THREE.InterpolateLinear // 线性插值最适合这种快速切换
                );
                tracks.push(track);
            }
        });

        if (tracks.length === 0) return null;

        // 计算总时长
        const totalDuration = currentTime;
        return { clip: new THREE.AnimationClip('GeneratedSpeech', totalDuration, tracks), duration: totalDuration };
    }

    // --- 6. 交互逻辑 ---
    const btn = document.getElementById('speakBtn');
    const input = document.getElementById('textInput');

    btn.addEventListener('click', () => {
        if (!faceMixer || !headMesh) return;
        const text = input.value;
        if (!text) return;

        btn.disabled = true;
        isSpeaking = true; // 开启微表情flag

        // 1. 生成动画
        const animData = generateAnimFromText(text);
        if (!animData) {
            btn.disabled = false;
            return;
        }

        // 2. 播放音频 (TTS)
        const utterance = new SpeechSynthesisUtterance(text);
        // 尝试匹配动画时长 (这是一个粗略的同步)
        // 动画时长 / 字符数 ≈ 速率
        // 浏览器 TTS 速率通常 1.0 是标准。我们需要根据生成的动画长度反推速率
        // 但这里我们简单点，固定语速
        utterance.rate = 1.0;

        // 稍微修正动画速度以匹配音频的实际长度 (Blind Sync)
        // 由于无法预知 TTS 确切长度，我们只能让动画大概匹配
        // 在 action.setEffectiveTimeScale 中可以调整动画播放速度

        window.speechSynthesis.cancel(); // 停止之前的
        window.speechSynthesis.speak(utterance);

        // 3. 播放动画
        const action = faceMixer.clipAction(animData.clip);
        action.setLoop(THREE.LoopOnce);
        action.clampWhenFinished = true;

        faceMixer.stopAllAction();
        action.reset();
        action.play();

        // 监听结束
        utterance.onend = () => {
            // 音频结束了，淡出动画
            action.fadeOut(0.2);
            isSpeaking = false;
            btn.disabled = false;

            // 归零
            setTimeout(() => {
               // headMesh.morphTargetInfluences.fill(0); // 可选：强制归零
            }, 300);
        };
    });

    // --- 7. 眨眼与循环 ---
    function updateBlink(delta) {
        if (!headMesh) return;
        const idxL = headMesh.morphTargetDictionary['eyeBlinkLeft'];
        const idxR = headMesh.morphTargetDictionary['eyeBlinkRight'];
        if (idxL === undefined) return;

        if (blinkState.isBlinking) {
            blinkState.value += blinkState.speed;
            if (blinkState.value >= 1) {
                blinkState.value = 1;
                blinkState.speed = -0.15; // 闭快睁慢
            } else if (blinkState.value <= 0) {
                blinkState.value = 0;
                blinkState.isBlinking = false;
                blinkState.speed = 0.15;
                blinkState.nextTime = clock.elapsedTime + 2 + Math.random() * 4;
            }
        } else {
            if (clock.elapsedTime > blinkState.nextTime) blinkState.isBlinking = true;
        }

        // 叠加眨眼 (不受 mixer 控制)
        // 注意：Mixer 会覆盖 value，所以我们需要在 animate 最后一步，或者确保 Mixer 里没有 eyeBlink 轨道
        // 我们生成的 generateAnimFromText 里不包含 blink，所以这里是安全的
        headMesh.morphTargetInfluences[idxL] = blinkState.value;
        headMesh.morphTargetInfluences[idxR] = blinkState.value;
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        if (bodyMixer) bodyMixer.update(delta);
        if (faceMixer) faceMixer.update(delta);

        updateBlink(delta);

        // 同步牙齿
        if (headMesh && teethMesh) {
            for (let i = 0; i < headMesh.morphTargetInfluences.length; i++) {
                 teethMesh.morphTargetInfluences[i] = headMesh.morphTargetInfluences[i];
            }
        }
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
