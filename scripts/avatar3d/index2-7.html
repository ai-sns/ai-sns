<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smooth Lip Sync</title>
    <style>
        body { margin: 0; overflow: hidden; background: #2a2a2a; font-family: sans-serif; }
        #ui-container {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; background: rgba(0,0,0,0.6); padding: 15px;
            border-radius: 12px; backdrop-filter: blur(8px); width: 80%; max-width: 600px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        input {
            flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #555;
            background: rgba(255,255,255,0.9); font-size: 16px; outline: none;
        }
        button {
            padding: 10px 25px; font-size: 16px; font-weight: 600; border: none; border-radius: 6px;
            cursor: pointer; background: #667eea; color: white; transition: 0.2s;
        }
        button:hover { background: #5a6fd6; }
        button:disabled { background: #555; cursor: wait; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

<div id="ui-container">
    <input type="text" id="textInput" value="Hello world, nice to meet you." placeholder="Type phrase...">
    <button id="speakBtn">Speak</button>
</div>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- 1. 参数配置 ---
    const CONFIG = {
        charDuration: 0.11, // 每个字符的基础时长 (调慢一点，让动作跟上声音)
        ttsDelay: 0.0,      // TTS 延迟补偿 (秒)，后面会用 setTimeout 动态处理
        smoothness: THREE.InterpolateSmooth // 使用平滑插值
    };

    // --- 2. 映射表 (保持轻量化) ---
    const VISEMES = {
        'sil': { jawOpen: 0.02, mouthClose: 0.1 },
        'a': { jawOpen: 0.25, mouthSmile: 0.1 },
        'e': { jawOpen: 0.15, mouthSmile: 0.2, mouthLowerDownLeft: 0.2 },
        'i': { jawOpen: 0.1, mouthStretchLeft: 0.2, mouthStretchRight: 0.2 },
        'o': { jawOpen: 0.2, mouthFunnel: 0.5, mouthPucker: 0.2 },
        'u': { jawOpen: 0.1, mouthPucker: 0.6, mouthFunnel: 0.1 },
        'b': { jawOpen: 0, mouthClose: 0.5 }, // 闭嘴音
        'p': { jawOpen: 0, mouthClose: 0.5, mouthPressLeft: 0.2 },
        'm': { jawOpen: 0, mouthClose: 0.5 },
        'f': { jawOpen: 0.1, mouthShrugLower: 0.5, mouthRollLower: 0.3 },
        'w': { jawOpen: 0.1, mouthPucker: 0.5 },
        'r': { jawOpen: 0.1, mouthFunnel: 0.3, mouthShrugLower: 0.3 },
        't': { jawOpen: 0.1, mouthShrugLower: 0.3, mouthSmile: 0.1 },
        's': { jawOpen: 0.05, mouthShrugUpper: 0.2, mouthSmile: 0.1 },
        'l': { jawOpen: 0.2, mouthShrugLower: 0.4 }
    };
    const CHAR_MAP = {
        'c': 's', 'd': 't', 'g': 'k', 'h': 'a', 'j': 's', 'k': 't', 'n': 'l',
        'q': 'w', 'v': 'f', 'x': 's', 'y': 'i', 'z': 's'
    };

    // --- 3. 场景标准设置 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.6, 1.1);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.58, 0);
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(1, 2, 2);
    scene.add(dirLight);

    // --- 4. 变量 ---
    let faceMixer = null;
    let bodyMixer = null;
    let headMesh = null;
    let teethMesh = null;
    const clock = new THREE.Clock();

    // --- 5. 加载模型 ---
    const loader = new GLTFLoader();
    loader.load('./officeyoumanblue_0_0_0_0_1_0.glb', (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        if (gltf.animations.length > 0) {
            bodyMixer = new THREE.AnimationMixer(model);
            const action = bodyMixer.clipAction(gltf.animations[0]);
            action.play();
            action.timeScale = 0.6;
        }

        model.traverse((child) => {
            if (child.isMesh && child.morphTargetDictionary) {
                if (child.name === 'Wolf3D_Head') headMesh = child;
                if (child.name === 'Wolf3D_Teeth') teethMesh = child;
            }
        });
        if (headMesh) faceMixer = new THREE.AnimationMixer(headMesh);
    });

    // --- 6. 核心：平滑动画生成器 ---
    function generateAnimFromText(text) {
        if (!headMesh) return null;

        const cleanText = text.toLowerCase().replace(/[^a-z ]/g, '');
        const dictionary = headMesh.morphTargetDictionary;

        // 我们需要为"所有"参与过口型的 morph 创建轨道，
        // 即使某个时刻它的值是 0，也需要设置关键帧，否则它会保持上一个状态
        const allMorphs = new Set();
        Object.values(VISEMES).forEach(def => Object.keys(def).forEach(k => allMorphs.add(k)));

        const tracksData = {};
        allMorphs.forEach(m => tracksData[m] = { times: [], values: [] });

        let currentTime = 0;

        // 6.1 关键修正：连续处理
        // 我们不再是 "字 -> 0 -> 字"，而是 "字 -> 字"
        for (let i = 0; i < cleanText.length; i++) {
            const char = cleanText[i];

            // 确定目标形状
            let targetMorphs = VISEMES['sil'];

            if (char === ' ') {
                targetMorphs = VISEMES['sil'];
            } else if (VISEMES[char]) {
                targetMorphs = VISEMES[char];
            } else if (CHAR_MAP[char] && VISEMES[CHAR_MAP[char]]) {
                targetMorphs = VISEMES[CHAR_MAP[char]];
            }

            // 在当前时间点 (currentTime)，设置所有轨道的值
            allMorphs.forEach(morphName => {
                const val = targetMorphs[morphName] || 0; // 如果当前音素不需要这个形状，就设为0

                tracksData[morphName].times.push(currentTime);
                tracksData[morphName].values.push(val);
            });

            // 时间推移
            // 技巧：根据是否是元音微调时间，元音(a,e,i,o,u)稍微长一点
            let duration = CONFIG.charDuration;
            if (['a','e','i','o','u'].includes(char)) duration *= 1.2;
            if (['w','m'].includes(char)) duration *= 1.1; // 慢速辅音

            currentTime += duration;
        }

        // 结尾增加一点静音时间，让嘴巴闭上
        currentTime += 0.2;
        allMorphs.forEach(morphName => {
            tracksData[morphName].times.push(currentTime);
            tracksData[morphName].values.push(0);
        });

        // 6.2 创建 Track
        const tracks = [];
        Object.keys(tracksData).forEach(morphName => {
            const index = dictionary[morphName];
            if (index !== undefined) {
                const track = new THREE.NumberKeyframeTrack(
                    `.morphTargetInfluences[${index}]`,
                    tracksData[morphName].times,
                    tracksData[morphName].values,
                    CONFIG.smoothness // <--- 关键：使用平滑插值，让 A 变到 B 不生硬
                );
                tracks.push(track);
            }
        });

        return new THREE.AnimationClip('Speech', -1, tracks);
    }

    // --- 7. 交互与播放逻辑 ---
    const btn = document.getElementById('speakBtn');
    const input = document.getElementById('textInput');

    // 眨眼逻辑
    const blinkState = { val: 0, isBlinking: false, nextTime: 2 };
    function updateBlink(dt) {
        if (!headMesh) return;
        const idxL = headMesh.morphTargetDictionary['eyeBlinkLeft'];
        const idxR = headMesh.morphTargetDictionary['eyeBlinkRight'];
        if (idxL === undefined) return;

        if (blinkState.isBlinking) {
            blinkState.val += 0.15; // 速度
            if (blinkState.val >= 1) { blinkState.val = 1; blinkState.isBlinking = false; } // 简化：只做闭眼，利用插值自动回弹? 不，手动控制比较好
        } else if (blinkState.val > 0) {
            blinkState.val -= 0.1; // 睁眼
        } else {
            // 等待
            blinkState.nextTime -= dt;
            if (blinkState.nextTime <= 0) {
                blinkState.isBlinking = true;
                blinkState.nextTime = 2 + Math.random() * 3;
            }
        }
        headMesh.morphTargetInfluences[idxL] = Math.max(0, blinkState.val);
        headMesh.morphTargetInfluences[idxR] = Math.max(0, blinkState.val);
    }

    btn.addEventListener('click', () => {
        if (!faceMixer) return;
        const text = input.value;

        // 1. 生成 TTS (不要立即播放)
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.9; // 语速稍微放慢一点点，更容易对上

        // 2. 生成动画
        const clip = generateAnimFromText(text);
        if (!clip) return;

        // 3. 播放逻辑：处理延迟
        btn.disabled = true;

        // 先让浏览器准备语音 (有些浏览器第一次合成有很大延迟)
        window.speechSynthesis.cancel();

        // 关键 Trick: 监听 start 事件来启动动画
        // 但是 start 事件有时候比声音出来要早。
        // 最稳妥的方法：先播放声音，延迟几百毫秒再播放动画

        window.speechSynthesis.speak(utterance);

        // 动画控制
        const action = faceMixer.clipAction(clip);
        action.setLoop(THREE.LoopOnce);
        action.clampWhenFinished = true;
        faceMixer.stopAllAction();
        action.reset();

        // 延迟 350ms 启动动画 (根据浏览器TTS通常的延迟经验值)
        setTimeout(() => {
            action.play();
        }, 350);

        utterance.onend = () => {
            btn.disabled = false;
            action.fadeOut(0.5);
        };
    });

    // --- 8. 循环 ---
    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        if (bodyMixer) bodyMixer.update(delta);
        if (faceMixer) faceMixer.update(delta);

        updateBlink(delta);

        if (headMesh && teethMesh) {
            for (let i = 0; i < headMesh.morphTargetInfluences.length; i++) {
                 teethMesh.morphTargetInfluences[i] = headMesh.morphTargetInfluences[i];
            }
        }
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
