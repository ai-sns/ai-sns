<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Silky Smooth Hello (Fixed Start)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', sans-serif; }
        #ui-container {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; background: rgba(0,0,0,0.8); padding: 20px;
            border-radius: 16px; backdrop-filter: blur(10px); width: 80%; max-width: 650px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
        }
        input {
            flex: 1; padding: 14px; border-radius: 8px; border: 1px solid #444;
            background: rgba(30,30,30,0.9); color: white; font-size: 16px; outline: none;
        }
        button {
            padding: 0 30px; font-size: 16px; font-weight: 600; border: none; border-radius: 8px;
            cursor: pointer; background: linear-gradient(135deg, #009688, #00796b); color: white;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.96); }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

<div id="ui-container">
    <input type="text" id="textInput" value="Hello world, nice to meet you." placeholder="Type phrase...">
    <button id="speakBtn">Speak</button>
</div>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- 1. 配置参数 ---
    const CONFIG = {
        baseCharTime: 0.12,
        sampleRate: 60,
        smoothRadius: 5,     // <--- 增加到 5，让起步更肉、更慢，消除“弹射感”
        overlapFactor: 0.65
    };

    // --- 2. 柔和映射表 (Soft Start Mode) ---
    const VISEMES = {
        // 静止 (闭嘴，但不要闭太紧)
        'sil': { jawOpen: 0.02, mouthClose: 0.05 },

        // *** 关键修复 ***
        // H: 这是一个呼吸音。以前映射到 A (0.22) 导致下巴瞬间掉下来。
        // 现在：jawOpen 0.06。这只是嘴唇微启，非常自然。
        'h': { jawOpen: 0.06 },

        // 元音 (Hello 的 e)
        'a': { jawOpen: 0.20, mouthSmile: 0.1 },
        'e': { jawOpen: 0.15, mouthSmile: 0.15 }, // Hello 的 'e'，稍微张开一点点
        'i': { jawOpen: 0.12, mouthSmile: 0.15, mouthStretchLeft: 0.1 },
        'o': { jawOpen: 0.18, mouthFunnel: 0.35, mouthPucker: 0.1 },
        'u': { jawOpen: 0.10, mouthPucker: 0.45 },

        // 辅音
        'b': { jawOpen: 0, mouthClose: 0.25 },
        'p': { jawOpen: 0, mouthClose: 0.28, mouthPressLeft: 0.1 },
        'm': { jawOpen: 0, mouthClose: 0.25 },
        'f': { jawOpen: 0.05, mouthShrugLower: 0.15, mouthRollLower: 0.1 },
        'w': { jawOpen: 0.05, mouthPucker: 0.35 },
        'r': { jawOpen: 0.1, mouthFunnel: 0.15 },
        'l': { jawOpen: 0.14, mouthShrugLower: 0.05 }, // L 保持稳定，不乱动下唇
        't': { jawOpen: 0.02, mouthShrugLower: 0 },
        's': { jawOpen: 0.02, mouthSmile: 0.1, mouthShrugUpper: 0.1 },
    };

    const CHAR_MAP = {
        'c': 's', 'd': 't', 'g': 'k', 'j': 's', 'k': 't',
        'n': 't',
        'q': 'w', 'v': 'f', 'x': 's', 'y': 'i', 'z': 's'
        // 注意：删除了 'h': 'a' 的映射，让 h 使用上面定义的专属小口型
    };

    // --- 3. 场景初始化 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.62, 0.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.58, 0);
    controls.enablePan = false;
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.0);
    keyLight.position.set(-1, 2, 3);
    scene.add(keyLight);
    const rimLight = new THREE.DirectionalLight(0x009688, 2.0); // 青色轮廓光
    rimLight.position.set(2, 2, -1.5);
    scene.add(rimLight);

    // --- 4. 变量 ---
    let faceMixer = null;
    let bodyMixer = null;
    let headMesh = null;
    let teethMesh = null;
    const clock = new THREE.Clock();

    // --- 5. 加载模型 ---
    const loader = new GLTFLoader();
    loader.load('./officeyoumanblue_0_0_0_0_1_0.glb', (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        if (gltf.animations.length > 0) {
            bodyMixer = new THREE.AnimationMixer(model);
            const action = bodyMixer.clipAction(gltf.animations[0]);
            action.play();
            action.timeScale = 0.5;
        }

        model.traverse((child) => {
            if (child.isMesh && child.morphTargetDictionary) {
                if (child.name === 'Wolf3D_Head') headMesh = child;
                if (child.name === 'Wolf3D_Teeth') teethMesh = child;
            }
        });
        if (headMesh) faceMixer = new THREE.AnimationMixer(headMesh);
    });

    // --- 6. 核心算法 ---
    function generateCoarticulatedAnim(text) {
        if (!headMesh) return null;

        const cleanText = text.toLowerCase().replace(/[^a-z ]/g, '');
        const dictionary = headMesh.morphTargetDictionary;

        const allMorphs = new Set();
        Object.values(VISEMES).forEach(v => Object.keys(v).forEach(k => allMorphs.add(k)));

        let totalTime = 0;
        const charTimings = [];

        for (let char of cleanText) {
            let dur = CONFIG.baseCharTime;
            if (['a','e','i','o','u'].includes(char)) dur *= 1.2;
            if (char === ' ') dur = 0.05;

            charTimings.push({
                char: char,
                start: totalTime,
                end: totalTime + dur
            });
            totalTime += (dur * CONFIG.overlapFactor);
        }
        totalTime += 0.3;

        const totalFrames = Math.ceil(totalTime * CONFIG.sampleRate);
        const buffers = {};

        allMorphs.forEach(m => {
            buffers[m] = new Float32Array(totalFrames).fill(0);
        });

        // 填充
        charTimings.forEach(ct => {
            const startFrame = Math.floor(ct.start * CONFIG.sampleRate);
            const endFrame = Math.ceil(ct.end * CONFIG.sampleRate);

            let targetShapes = VISEMES['sil'];
            const c = ct.char;

            // 查找优先级：明确定义的 > 映射的 > 静止
            if (c === ' ') targetShapes = VISEMES['sil'];
            else if (VISEMES[c]) targetShapes = VISEMES[c]; // 这里会找到我们新定义的 'h'
            else if (CHAR_MAP[c] && VISEMES[CHAR_MAP[c]]) targetShapes = VISEMES[CHAR_MAP[c]];

            Object.keys(targetShapes).forEach(morphName => {
                if (buffers[morphName]) {
                    const val = targetShapes[morphName];
                    for (let f = startFrame; f < endFrame; f++) {
                        if (f < totalFrames) {
                            buffers[morphName][f] = Math.max(buffers[morphName][f], val);
                        }
                    }
                }
            });
        });

        // 平滑处理 (Blur)
        allMorphs.forEach(morphName => {
            const rawBuffer = buffers[morphName];
            const smoothedBuffer = new Float32Array(totalFrames);
            const r = CONFIG.smoothRadius;

            for (let i = 0; i < totalFrames; i++) {
                let sum = 0;
                let count = 0;
                // 加权平均？不，简单移动平均足够了，但是边界要处理好
                for (let j = i - r; j <= i + r; j++) {
                    if (j >= 0 && j < totalFrames) {
                        sum += rawBuffer[j];
                        count++;
                    }
                }
                smoothedBuffer[i] = sum / count;
            }
            buffers[morphName] = smoothedBuffer;
        });

        const tracks = [];
        allMorphs.forEach(morphName => {
            const idx = dictionary[morphName];
            if (idx === undefined) return;

            const times = [];
            const values = [];

            for (let i = 0; i < totalFrames; i++) {
                times.push(i / CONFIG.sampleRate);
                values.push(buffers[morphName][i]);
            }

            // 优化：剔除无动作轨道
            if (Math.max(...values) > 0.001) {
                tracks.push(new THREE.NumberKeyframeTrack(
                    `.morphTargetInfluences[${idx}]`,
                    times,
                    values,
                    THREE.InterpolateLinear
                ));
            }
        });

        return new THREE.AnimationClip('FluidSpeech', totalTime, tracks);
    }

    // --- 7. 交互 ---
    const btn = document.getElementById('speakBtn');
    const input = document.getElementById('textInput');

    // 眨眼
    const blinkState = { val: 0, isBlinking: false, nextTime: 2 };
    function updateBlink(dt) {
        if (!headMesh) return;
        const idxL = headMesh.morphTargetDictionary['eyeBlinkLeft'];
        const idxR = headMesh.morphTargetDictionary['eyeBlinkRight'];
        if (idxL === undefined) return;

        if (blinkState.isBlinking) {
            blinkState.val += 0.15;
            if (blinkState.val >= 1) { blinkState.val = 1; blinkState.isBlinking = false; }
        } else if (blinkState.val > 0) {
            blinkState.val -= 0.1;
        } else {
            blinkState.nextTime -= dt;
            if (blinkState.nextTime <= 0) {
                blinkState.isBlinking = true;
                blinkState.nextTime = 2 + Math.random() * 3;
            }
        }
        headMesh.morphTargetInfluences[idxL] = Math.max(0, blinkState.val);
        headMesh.morphTargetInfluences[idxR] = Math.max(0, blinkState.val);
    }

    btn.addEventListener('click', () => {
        if (!faceMixer) return;
        const text = input.value;
        const utterance = new SpeechSynthesisUtterance(text);

        const clip = generateCoarticulatedAnim(text);
        if (!clip) return;

        btn.disabled = true;

        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);

        const action = faceMixer.clipAction(clip);
        action.setLoop(THREE.LoopOnce);
        action.clampWhenFinished = true;

        faceMixer.stopAllAction();
        action.reset();

        setTimeout(() => {
            action.play();
        }, 300);

        utterance.onend = () => {
            btn.disabled = false;
            action.fadeOut(0.5);
        };
    });

    // --- 8. 循环 ---
    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        if (bodyMixer) bodyMixer.update(delta);
        if (faceMixer) faceMixer.update(delta);
        updateBlink(delta);

        if (headMesh && teethMesh) {
            if(headMesh.morphTargetInfluences.length === teethMesh.morphTargetInfluences.length) {
                 for (let i = 0; i < headMesh.morphTargetInfluences.length; i++) {
                     teethMesh.morphTargetInfluences[i] = headMesh.morphTargetInfluences[i];
                }
            }
        }
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
