<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ARKit Lip Sync - Hello World</title>
    <style>
        body { margin: 0; overflow: hidden; background: #333; }
        #btn-container {
            position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none;
        }
        button {
            pointer-events: auto; padding: 12px 24px; font-size: 18px;
            background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer;
        }
        button:active { background: #45a049; }
    </style>
    <!-- Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

<div id="btn-container">
    <button id="sayBtn">Say "Hello World"</button>
</div>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- 场景初始化 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.6, 1.2); // 把相机对准脸部

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.55, 0);
    controls.update();

    // 灯光
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(1, 2, 3);
    scene.add(dirLight);

    // --- 变量 ---
    let mixer = null;
    let headMesh = null;
    let teethMesh = null;
    const clock = new THREE.Clock();

    // --- 核心：定义 "Hello World" 的关键帧数据 ---
    // 我们定义时间点和对应的 ARKit 形状权重
    // 格式: { time: 秒, morphs: { 形状名: 权重, ... } }
    const speechTimeline = [
        { time: 0.0, morphs: {} }, // 初始状态

        // --- HELLO ---
        // H (0.1s)
        { time: 0.1, morphs: { jawOpen: 0.15, mouthShrugUpper: 0.2 } },
        // E (0.2s) - Hello 的 'e'
        { time: 0.2, morphs: { jawOpen: 0.35, mouthLowerDownLeft: 0.4, mouthLowerDownRight: 0.4, mouthSmileLeft: 0.2, mouthSmileRight: 0.2 } },
        // L (0.35s) - 舌头音，稍微闭一点嘴，抬下唇
        { time: 0.35, morphs: { jawOpen: 0.2, mouthShrugLower: 0.7 } },
        // O (0.5s) - 嘴圆
        { time: 0.5, morphs: { jawOpen: 0.4, mouthFunnel: 0.9, mouthPucker: 0.2 } },

        // --- WORLD ---
        // W (0.65s) - 极度嘟嘴
        { time: 0.65, morphs: { jawOpen: 0.1, mouthPucker: 0.9, mouthFunnel: 0.3 } },
        // R (0.8s) - Wo -> r
        { time: 0.8, morphs: { jawOpen: 0.25, mouthFunnel: 0.5, mouthShrugLower: 0.4 } },
        // L (0.9s)
        { time: 0.9, morphs: { jawOpen: 0.2, mouthShrugLower: 0.7 } },
        // D (1.0s) - 闭嘴后松开
        { time: 1.0, morphs: { jawOpen: 0.05, mouthClose: 0.4 } },

        // --- END ---
        { time: 1.2, morphs: {} } // 归零
    ];

    // --- 加载模型 ---
    const loader = new GLTFLoader();
    // 替换成你的 .glb 文件路径
    loader.load('./officeyoumanblue_0_0_0_0_1_0.glb', (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        // 1. 寻找 Head 和 Teeth 网格
        model.traverse((child) => {
            if (child.isMesh && child.morphTargetDictionary) {
                // 根据你提供的名字匹配
                if (child.name === 'Wolf3D_Head') {
                    headMesh = child;
                    console.log("找到头部:", child.name);
                }
                if (child.name === 'Wolf3D_Teeth') {
                    teethMesh = child;
                    console.log("找到牙齿:", child.name);
                }
            }
        });

        if (headMesh) {
            // 我们在头部创建 Mixer
            mixer = new THREE.AnimationMixer(headMesh);
        } else {
            console.error("未找到 Wolf3D_Head，请检查 GLB 文件");
        }
    });

    // --- 生成动画 Clip 的函数 ---
    function createSpeechClip(timeline) {
        if (!headMesh) return null;

        const dictionary = headMesh.morphTargetDictionary;
        const tracks = [];

        // 1. 收集所有用到的 morph 名称
        const usedMorphs = new Set();
        timeline.forEach(kf => {
            Object.keys(kf.morphs).forEach(key => usedMorphs.add(key));
        });

        // 2. 为每个用到的 morph 创建一个轨道
        usedMorphs.forEach(morphName => {
            const index = dictionary[morphName];
            if (index === undefined) {
                console.warn(`模型中缺少 Morph Target: ${morphName}`);
                return;
            }

            const times = [];
            const values = [];

            // 遍历时间轴填充数据
            timeline.forEach(kf => {
                times.push(kf.time);
                // 如果当前关键帧有这个 morph 的值就用，没有就归 0
                values.push(kf.morphs[morphName] || 0);
            });

            // 创建轨道：针对 Head Mesh
            // 属性名格式: .morphTargetInfluences[index]
            const track = new THREE.NumberKeyframeTrack(
                `.morphTargetInfluences[${index}]`,
                times,
                values
            );
            tracks.push(track);
        });

        if (tracks.length === 0) return null;

        // 创建动画剪辑
        return new THREE.AnimationClip('SpeakHello', -1, tracks);
    }

    // --- 按钮事件 ---
    document.getElementById('sayBtn').addEventListener('click', () => {
        if (!mixer || !headMesh) return;

        // 1. 生成 Clip
        const clip = createSpeechClip(speechTimeline);
        if (!clip) return;

        // 2. 播放音频 (TTS)
        const utterance = new SpeechSynthesisUtterance("Hello World");
        utterance.rate = 0.9; // 语速稍慢以匹配动画
        window.speechSynthesis.speak(utterance);

        // 3. 播放动画
        const action = mixer.clipAction(clip);
        action.setLoop(THREE.LoopOnce);
        action.clampWhenFinished = true;

        // 停止之前的动作并播放新的
        mixer.stopAllAction();
        action.reset();
        action.play();

        // 监听结束，清理状态
        const cleanup = () => {
             // 动画结束后稍微延迟一下全部归零，避免动作僵硬
             setTimeout(() => {
                headMesh.morphTargetInfluences.fill(0);
                if(teethMesh) teethMesh.morphTargetInfluences.fill(0);
             }, 100);
             mixer.removeEventListener('finished', cleanup);
        };
        mixer.addEventListener('finished', cleanup);
    });

    // --- 渲染循环 ---
    function animate() {
        requestAnimationFrame(animate);

        const delta = clock.getDelta();
        if (mixer) mixer.update(delta);

        // *** 关键：手动同步牙齿 ***
        // 因为 Mixer 只驱动了 Head，我们需要每一帧把 Head 的数值复制给 Teeth
        // 这样牙齿就会跟着嘴巴动，而不需要给牙齿单独创建重复的动画轨道
        if (headMesh && teethMesh) {
            // 直接拷贝整个影响数组
            // 注意：前提是 Head 和 Teeth 的 Morph Targets 顺序和列表完全一致
            // 如果不一致，需要根据名字去 map，但 ReadyPlayerMe 通常是一致的
            if (teethMesh.morphTargetInfluences.length === headMesh.morphTargetInfluences.length) {
                for (let i = 0; i < headMesh.morphTargetInfluences.length; i++) {
                     teethMesh.morphTargetInfluences[i] = headMesh.morphTargetInfluences[i];
                }
            }
        }

        renderer.render(scene, camera);
    }
    animate();

    // 窗口大小调整
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
