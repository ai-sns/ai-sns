<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ready Player Me Lip Sync - Hello World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #0f0f23;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 25px;
            border-radius: 15px;
            z-index: 100;
            max-width: 350px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h3 {
            margin: 0 0 15px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 24px;
            font-weight: 700;
        }

        .file-upload-wrapper {
            position: relative;
            margin: 15px 0;
        }

        #file-input {
            display: none;
        }

        .file-upload-label {
            display: block;
            padding: 12px 20px;
            background: rgba(102, 126, 234, 0.2);
            border: 2px dashed rgba(102, 126, 234, 0.5);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .file-upload-label:hover {
            background: rgba(102, 126, 234, 0.3);
            border-color: rgba(102, 126, 234, 0.8);
        }

        .file-upload-label.has-file {
            background: rgba(102, 126, 234, 0.3);
            border-color: #667eea;
            border-style: solid;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 24px;
            margin: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            background: linear-gradient(135deg, #555 0%, #444 100%);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            opacity: 0.6;
        }

        #status {
            margin-top: 15px;
            padding: 12px;
            background: rgba(102, 126, 234, 0.15);
            border-left: 3px solid #667eea;
            border-radius: 5px;
            font-size: 13px;
            line-height: 1.5;
        }

        .info {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
            color: #aaa;
            line-height: 1.8;
        }

        .info p {
            margin: 8px 0;
        }

        .emoji {
            margin-right: 8px;
        }

        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 35, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        #loading-overlay.show {
            display: flex;
        }

        .loading-content {
            text-align: center;
            color: white;
        }

        .spinner {
            border: 4px solid rgba(102, 126, 234, 0.2);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .button-group {
            display: flex;
            gap: 8px;
        }

        .button-group button {
            flex: 1;
            font-size: 14px;
            padding: 12px 16px;
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div id="loading-overlay">
            <div class="loading-content">
                <div class="spinner"></div>
                <p>加载模型中...</p>
            </div>
        </div>
    </div>

    <div id="controls">
        <h3><span class="emoji">🎭</span>Lip Sync Demo</h3>

        <div class="file-upload-wrapper">
            <input type="file" id="file-input" accept=".glb,.gltf" />
            <label for="file-input" class="file-upload-label" id="file-label">
                <span class="emoji">📁</span>点击上传 GLB 模型
            </label>
        </div>

        <button id="speak-btn" disabled>
            <span class="emoji">🗣️</span>说 "Hello World"
        </button>

        <div class="button-group">
            <button id="test-visemes-btn" disabled>
                <span class="emoji">🧪</span>测试音素
            </button>
            <button id="reset-btn" disabled>
                <span class="emoji">🔄</span>重置
            </button>
        </div>

        <div id="status">
            <span class="emoji">⏳</span>等待上传模型...
        </div>

        <div class="info">
            <p><span class="emoji">💡</span>支持 ARKit 标准 morph targets</p>
            <p><span class="emoji">🎯</span>自动映射 52 个面部控制点</p>
            <p><span class="emoji">🎬</span>平滑的嘴型动画过渡</p>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ========================================
        // VISEME 映射配置
        // ========================================

        const VISEME_MAPPINGS = {
            'sil': {
                jawOpen: 0,
                mouthClose: 0.15
            },
            'AA': {
                jawOpen: 0.4,
                mouthFunnel: 0.15,
                mouthLowerDownLeft: 0.2,
                mouthLowerDownRight: 0.2
            },
            'E': {
                jawOpen: 0.25,
                mouthStretchLeft: 0.3,
                mouthStretchRight: 0.3,
                mouthSmileLeft: 0.15,
                mouthSmileRight: 0.15
            },
            'I': {
                jawOpen: 0.15,
                mouthStretchLeft: 0.4,
                mouthStretchRight: 0.4,
                mouthSmileLeft: 0.25,
                mouthSmileRight: 0.25
            },
            'O': {
                jawOpen: 0.3,
                mouthFunnel: 0.35,
                mouthPucker: 0.3,
                jawForward: 0.1
            },
            'U': {
                jawOpen: 0.2,
                mouthFunnel: 0.45,
                mouthPucker: 0.4,
                jawForward: 0.15
            },
            'W': {
                jawOpen: 0.15,
                mouthFunnel: 0.4,
                mouthPucker: 0.45,
                jawForward: 0.2
            },
            'L': {
                jawOpen: 0.2,
                tongueOut: 0.15,
                mouthStretchLeft: 0.1,
                mouthStretchRight: 0.1
            },
            'D': {
                jawOpen: 0.25,
                tongueOut: 0.1,
                mouthUpperUpLeft: 0.15,
                mouthUpperUpRight: 0.15
            },
            'T': {
                jawOpen: 0.2,
                tongueOut: 0.08,
                mouthUpperUpLeft: 0.15,
                mouthUpperUpRight: 0.15
            },
            'R': {
                jawOpen: 0.25,
                mouthFunnel: 0.2,
                jawForward: 0.1
            },
            'M': {
                jawOpen: 0,
                mouthClose: 0.45,
                mouthPressLeft: 0.35,
                mouthPressRight: 0.35,
                mouthRollLower: 0.15,
                mouthRollUpper: 0.15
            },
            'F': {
                jawOpen: 0.15,
                mouthLowerDownLeft: 0.3,
                mouthLowerDownRight: 0.3,
                mouthUpperUpLeft: 0.2,
                mouthUpperUpRight: 0.2
            },
            'S': {
                jawOpen: 0.15,
                mouthClose: 0.05,
                mouthStretchLeft: 0.2,
                mouthStretchRight: 0.2,
                tongueOut: 0.05
            },
            'TH': {
                jawOpen: 0.2,
                tongueOut: 0.25,
                mouthLowerDownLeft: 0.2,
                mouthLowerDownRight: 0.2
            },
            'H': {
                jawOpen: 0.25,
                mouthStretchLeft: 0.1,
                mouthStretchRight: 0.1
            }
        };

        // "Hello World" 音素序列
        const HELLO_WORLD_PHONEMES = [
            { phoneme: 'sil', duration: 50 },
            { phoneme: 'H', duration: 80 },
            { phoneme: 'E', duration: 140 },
            { phoneme: 'L', duration: 90 },
            { phoneme: 'O', duration: 160 },
            { phoneme: 'sil', duration: 100 },
            { phoneme: 'W', duration: 130 },
            { phoneme: 'O', duration: 110 },
            { phoneme: 'R', duration: 90 },
            { phoneme: 'L', duration: 80 },
            { phoneme: 'D', duration: 110 },
            { phoneme: 'sil', duration: 150 }
        ];

        // ========================================
        // Three.js 场景设置
        // ========================================

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f0f23);
        scene.fog = new THREE.Fog(0x0f0f23, 5, 15);

        const camera = new THREE.PerspectiveCamera(
            45,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(0, 1.65, 1.8);

        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            alpha: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.65, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 0.5;
        controls.maxDistance = 5;
        controls.maxPolarAngle = Math.PI / 1.5;
        controls.update();

        // 光照
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const keyLight = new THREE.DirectionalLight(0xffffff, 0.8);
        keyLight.position.set(2, 3, 3);
        keyLight.castShadow = true;
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0x9bb3ff, 0.4);
        fillLight.position.set(-2, 2, -2);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0xffb3d9, 0.3);
        rimLight.position.set(0, 2, -3);
        scene.add(rimLight);

        // 添加地面
        const groundGeometry = new THREE.PlaneGeometry(20, 20);
        const groundMaterial = new THREE.MeshStandardMaterial({
            color: 0x1a1a2e,
            roughness: 0.8,
            metalness: 0.2
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        // ========================================
        // Viseme 控制器类
        // ========================================

        class VisemeController {
            constructor(morphTargetMeshes) {
                this.meshes = morphTargetMeshes;
                this.isPlaying = false;
            }

            setMorphTarget(targetName, value) {
                this.meshes.forEach(mesh => {
                    const index = mesh.morphTargetDictionary?.[targetName];
                    if (index !== undefined) {
                        mesh.morphTargetInfluences[index] = Math.max(0, Math.min(1, value));
                    }
                });
            }

            resetAll() {
                this.meshes.forEach(mesh => {
                    if (mesh.morphTargetInfluences) {
                        mesh.morphTargetInfluences.fill(0);
                    }
                });
            }

            applyViseme(visemeName, intensity = 1.0) {
                const config = VISEME_MAPPINGS[visemeName];
                if (!config) return false;

                for (const [targetName, targetValue] of Object.entries(config)) {
                    this.setMorphTarget(targetName, targetValue * intensity);
                }
                return true;
            }

            async transitionToViseme(visemeName, duration = 80, intensity = 1.0) {
                const targetConfig = VISEME_MAPPINGS[visemeName];
                if (!targetConfig) return false;

                const startValues = {};
                const targetValues = {};

                this.meshes.forEach(mesh => {
                    for (const targetName of Object.keys(targetConfig)) {
                        const index = mesh.morphTargetDictionary?.[targetName];
                        if (index !== undefined) {
                            if (!startValues[targetName]) {
                                startValues[targetName] = mesh.morphTargetInfluences[index];
                            }
                            targetValues[targetName] = targetConfig[targetName] * intensity;
                        }
                    }
                });

                const startTime = Date.now();
                return new Promise(resolve => {
                    const animate = () => {
                        const elapsed = Date.now() - startTime;
                        const progress = Math.min(elapsed / duration, 1);
                        const eased = this.easeInOutCubic(progress);

                        for (const [targetName, targetValue] of Object.entries(targetValues)) {
                            const start = startValues[targetName] || 0;
                            const current = start + (targetValue - start) * eased;
                            this.setMorphTarget(targetName, current);
                        }

                        if (progress < 1) {
                            requestAnimationFrame(animate);
                        } else {
                            resolve(true);
                        }
                    };
                    animate();
                });
            }

            async playPhonemeSequence(phonemeSequence, smooth = true) {
                if (this.isPlaying) return false;

                this.isPlaying = true;
                this.resetAll();

                // 全局强度调节（0.7 = 70% 强度，让动作更自然）
                const globalIntensity = 0.7;

                for (const { phoneme, duration } of phonemeSequence) {
                    if (smooth) {
                        const transitionTime = Math.min(50, duration * 0.4);
                        await this.transitionToViseme(phoneme, transitionTime, globalIntensity);
                        await this.sleep(duration - transitionTime);
                    } else {
                        this.applyViseme(phoneme, globalIntensity);
                        await this.sleep(duration);
                    }
                }

                this.resetAll();
                this.isPlaying = false;
                return true;
            }

            sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            easeInOutCubic(t) {
                return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
            }
        }

        // ========================================
        // 应用逻辑
        // ========================================

        let model = null;
        let morphTargetMeshes = [];
        let visemeController = null;

        const fileInput = document.getElementById('file-input');
        const fileLabel = document.getElementById('file-label');
        const speakBtn = document.getElementById('speak-btn');
        const testBtn = document.getElementById('test-visemes-btn');
        const resetBtn = document.getElementById('reset-btn');
        const statusDiv = document.getElementById('status');
        const loadingOverlay = document.getElementById('loading-overlay');

        const loader = new GLTFLoader();

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                fileLabel.textContent = `📄 ${file.name}`;
                fileLabel.classList.add('has-file');
                loadingOverlay.classList.add('show');
                statusDiv.innerHTML = '<span class="emoji">⏳</span>加载模型中...';

                const url = URL.createObjectURL(file);
                loadModel(url);
            }
        });

        function loadModel(url) {
            if (model) {
                scene.remove(model);
            }
            morphTargetMeshes = [];

            loader.load(
                url,
                (gltf) => {
                    model = gltf.scene;
                    scene.add(model);

                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;

                            if (child.morphTargetDictionary) {
                                console.log('✅ 找到 morph targets:', child.name, Object.keys(child.morphTargetDictionary));
                                morphTargetMeshes.push(child);
                            }
                        }
                    });

                    if (morphTargetMeshes.length > 0) {
                        visemeController = new VisemeController(morphTargetMeshes);
                        speakBtn.disabled = false;
                        testBtn.disabled = false;
                        resetBtn.disabled = false;
                        statusDiv.innerHTML = `<span class="emoji">✅</span>成功！找到 ${morphTargetMeshes.length} 个可动画网格`;
                    } else {
                        statusDiv.innerHTML = '<span class="emoji">❌</span>模型不包含 morph targets';
                    }

                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());

                    model.position.sub(center);
                    model.position.y += size.y / 2;

                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = 0.5 / maxDim;
                    model.scale.multiplyScalar(scale);

                    loadingOverlay.classList.remove('show');
                },
                (progress) => {
                    if (progress.total > 0) {
                        const percent = (progress.loaded / progress.total * 100).toFixed(0);
                        statusDiv.innerHTML = `<span class="emoji">⏳</span>加载中... ${percent}%`;
                    }
                },
                (error) => {
                    console.error('❌ 加载失败:', error);
                    statusDiv.innerHTML = '<span class="emoji">❌</span>加载失败，请检查文件格式';
                    loadingOverlay.classList.remove('show');
                }
            );
        }

        speakBtn.addEventListener('click', async () => {
            if (!visemeController || visemeController.isPlaying) return;

            speakBtn.disabled = true;
            statusDiv.innerHTML = '<span class="emoji">🗣️</span>正在说话...';

            const utterance = new SpeechSynthesisUtterance("Hello World");
            utterance.rate = 0.9;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;
            speechSynthesis.speak(utterance);

            await visemeController.playPhonemeSequence(HELLO_WORLD_PHONEMES, true);

            speakBtn.disabled = false;
            statusDiv.innerHTML = '<span class="emoji">✅</span>完成！再次点击可重复';
        });

        testBtn.addEventListener('click', async () => {
            if (!visemeController || visemeController.isPlaying) return;

            testBtn.disabled = true;
            statusDiv.innerHTML = '<span class="emoji">🧪</span>测试音素中...';

            const visemeNames = Object.keys(VISEME_MAPPINGS);

            for (const visemeName of visemeNames) {
                statusDiv.innerHTML = `<span class="emoji">🧪</span>测试: ${visemeName}`;
                visemeController.resetAll();
                visemeController.applyViseme(visemeName, 0.7); // 使用 70% 强度
                await visemeController.sleep(600);
            }

            visemeController.resetAll();
            testBtn.disabled = false;
            statusDiv.innerHTML = '<span class="emoji">✅</span>测试完成！';
        });

        resetBtn.addEventListener('click', () => {
            if (visemeController) {
                visemeController.resetAll();
                statusDiv.innerHTML = '<span class="emoji">🔄</span>已重置面部表情';
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('🎭 Ready Player Me Lip Sync 已就绪！');
        console.log('📋 Viseme 映射:', VISEME_MAPPINGS);
        console.log('🎬 Hello World 音素:', HELLO_WORLD_PHONEMES);
    </script>
</body>
</html>
