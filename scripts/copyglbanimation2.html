<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Animation Retargeting</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
<script src="https://unpkg.com/three@0.134.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://unpkg.com/three@0.134.0/examples/js/utils/SkeletonUtils.js"></script>



<script>
let scene, camera, renderer, mixer, controls;

init();
loadModels();
animate();

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.5, 5);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambient);
    const spot = new THREE.SpotLight(0xffffff, 1);
    spot.position.set(15, 40, 35);
    scene.add(spot);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.25;
    controls.minDistance = 2;
    controls.maxDistance = 10;
    controls.target.set(0, 1, 0);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

function loadModels() {
    const loader = new THREE.GLTFLoader();

    Promise.all([
        loadModel(loader, 'girlwithmouth.glb'),
        loadModel(loader, 't-shirtgirl2.glb')
    ]).then(([gltfA, gltfB]) => {
        const modelA = SkeletonUtils.clone(gltfA.scene);
        modelA.position.set(-1.5, 0, 0);
        scene.add(modelA);

        const modelB = gltfB.scene;
        modelB.position.set(1.5, 0, 0);
        scene.add(modelB);

        // 创建动画Mixer
        mixer = new THREE.AnimationMixer(modelA);

        // 遍历B模型的动画，并尝试绑定到A模型
        gltfB.animations.forEach(clip => {
            // 简单方式：直接使用原始clip，如果骨架名字一样则有效
            const action = mixer.clipAction(clip);
            action.play();
        });

        console.log('Models loaded. If animation does not play, check bone names.');
    }).catch(err => console.error(err));
}

function loadModel(loader, url) {
    return new Promise((resolve, reject) => {
        loader.load(url, resolve, undefined, reject);
    });
}

function animate() {
    requestAnimationFrame(animate);
    const delta = 0.016;
    if (mixer) mixer.update(delta);
    controls.update();
    renderer.render(scene, camera);
}
</script>
</body>
</html>
