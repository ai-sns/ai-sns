<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Office Scene with Character Movement</title>
    <style>
        /* 设置 body 的样式 */
        body {
            margin: 0;
            overflow: hidden; /* 隐藏滚动条 */
            background: rgba(0, 0, 0, 1); /* 使用 RGBA 以确保背景透明 */
        }

        canvas {
            display: block; /* 确保 canvas 占据整个页面 */
        }
    </style>
</head>
<body>

<!-- 引入 Three.js 库和相关模块 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://fastly.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://fastly.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
    // 创建场景
    const scene = new THREE.Scene();

    // 创建相机并设置其位置
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.6, 3); // 相机高度1.6，离角色3个单位

    // 创建渲染器
    const renderer = new THREE.WebGLRenderer({antialias: true, alpha: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 设置相机控制
    const controls = new THREE.OrbitControls(camera, renderer.domElement);

    // 添加环境光源
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5); // 环境光
    scene.add(ambientLight);

    // 添加方向光源
    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5); // 方向光
    directionalLight.position.set(5, 10, 7.5);
    directionalLight.castShadow = true; // 启用阴影
    scene.add(directionalLight);

    // 添加点光源
    const pointLight = new THREE.PointLight(0xffffff, 1, 100);
    pointLight.position.set(0, 5, 0);
    scene.add(pointLight);

    // 加载角色模型
    const loader = new THREE.GLTFLoader();
    let mixer;
    let character;
    let actions = {};
    let currentAction = null;

    // 加载角色模型
    loader.load('tgirl.glb', function (gltf) {
        character = gltf.scene;
        character.scale.set(2.2, 2.2, 2.2); // 调整角色大小
        scene.add(character); // 将角色加入场景

        // 获取模型的包围盒以设置其初始位置
        const box = new THREE.Box3().setFromObject(character);
        const center = box.getCenter(new THREE.Vector3()); // 获取模型中心

        // 将角色放置在场景中心
        character.position.set(0, center.y-4.0, 0); // X 和 Z 轴设置为 0，Y 轴为模型的高度
        character.rotation.x -= 0.2;
        mixer = new THREE.AnimationMixer(character);

        // 加载动画
        gltf.animations.forEach((clip) => {
            const action = mixer.clipAction(clip);
            actions[clip.name] = action;
        });

        playAction('weightshift'); // 播放初始动画
    });

    let keys = {};
    window.addEventListener('keydown', (event) => {
        keys[event.code] = true;
        handleKeyDown(event.code);
    });

    window.addEventListener('keyup', (event) => {
        keys[event.code] = false;
    });

    // 处理按键事件
    function handleKeyDown(code) {
        const actionMap = {
            'KeyR': 'walking4',
            'KeyW': 'standingspeaking2',
            'KeyI': 'Armature.001|golf',
            'KeyS': 'Armature.001|boxing',
            'KeyM': 'weightshift',
            'KeyP': 'showTextBubble',
            'KeyX': 'showTextBubble2'
        };
        if (actionMap[code]) {
            playAction(actionMap[code]);
        }
    }

    function playAction(actionName) {
        if (actionName !== 'showTextBubble' && actionName !== 'showTextBubble2') {
            if (currentAction) currentAction.stop(); // 停止当前动画
        }

        const action = actions[actionName];
        if (action) {
            action.reset().play(); // 重置并播放新动画
            currentAction = action;
        }

        // 显示对话气泡
        if (actionName === 'showTextBubble') {
            createSpeechBubble('请说话...');
        }
        if (actionName === 'showTextBubble2') {
            createSpeechBubble('思考中...');
        }
    }

    // 创建文本气泡
    let currentSpeechBubble = null; // 存储当前显示的气泡

    function createSpeechBubble(text) {
        // 如果存在之前的气泡，将其从场景中移除
        if (currentSpeechBubble) {
            scene.remove(currentSpeechBubble);
            currentSpeechBubble.material.map.dispose(); // 释放纹理资源
            currentSpeechBubble.material.dispose(); // 释放材质资源
        }

        // 创建 canvas 绘制文本
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        context.font = '48px Arial';
        const textWidth = context.measureText(text).width;
        canvas.width = textWidth + 20; // 根据文本宽度调整画布宽度
        canvas.height = 100; // 高度固定

        // 重新获取上下文以确保新尺寸生效
        const newContext = canvas.getContext('2d');
        newContext.font = '48px Arial';
        newContext.fillStyle = 'black';
        newContext.fillText(text, 10, 50); // 绘制文本

        // 创建纹理材质
        const texture = new THREE.CanvasTexture(canvas);
        const material = new THREE.SpriteMaterial({map: texture});
        const sprite = new THREE.Sprite(material);
        sprite.scale.set(2, 1, 1); // 设置气泡尺寸

        // 将气泡位置设定在角色的头顶
        if (character) {
            sprite.position.set(character.position.x, character.position.y + 1.5, character.position.z);
        }

        // 将气泡添加到场景
        scene.add(sprite);
        currentSpeechBubble = sprite; // 更新当前气泡
    }

    // 动画循环
    function animate() {
        requestAnimationFrame(animate);
        updateCharacterPositionAndRotation(); // 更新角色位置和旋转

        if (mixer) {
            mixer.update(0.015); // 更新动画混合器
        }

        controls.update(); // 更新控制器
        renderer.render(scene, camera); // 渲染场景
    }

    // 更新角色位置和旋转
    function updateCharacterPositionAndRotation() {
        if (character) {
            const moveSpeed = 0.05;
            const rotateSpeed = 0.02;
            // 处理角色的移动
            if (keys['ArrowUp']) character.position.z -= moveSpeed; // 向前
            if (keys['ArrowDown']) character.position.z += moveSpeed; // 向后
            if (keys['ArrowLeft']) character.position.x -= moveSpeed; // 向左
            if (keys['ArrowRight']) character.position.x += moveSpeed; // 向右
            if (keys['KeyA']) character.rotation.y += rotateSpeed; // 向左旋转
            if (keys['KeyD']) character.rotation.y -= rotateSpeed; // 向右旋转
        }
    }

    animate(); // 启动动画循环

    // 窗口调整事件
    window.addEventListener('resize', function () {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight; // 更新相机宽高比
        camera.updateProjectionMatrix(); // 更新投影矩阵
    });
</script>

<script>
    // 辅助功能，用于按键控制
    function walk() {
        handleKeyDown('KeyR');
    }

    function talk() {
        handleKeyDown('KeyW');
    }

    function idle() {
        handleKeyDown('KeyM');
    }

    function waitsay() {
        handleKeyDown('KeyP');
    }

    function stopsay() {
        handleKeyDown('KeyX');
    }

    function showmessage(msg) {
        alert(msg);
    }
</script>
</body>
</html>
