<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNS Sidebar Improvements Test</title>
    <link rel="stylesheet" href="renderer/css/themes.css">
    <link rel="stylesheet" href="renderer/css/sns.css">
    <link rel="stylesheet" href="renderer/css/components.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .test-container {
            max-width: 350px;
            height: 600px;
            margin: 0 auto;
            border: 1px solid var(--border-color, #e0e0e0);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: var(--color-primary, #1a73e8);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        .theme-toggle:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">Toggle Theme</button>
    
    <div class="test-container" id="snsContainer"></div>

    <script type="module">
        import SNSSidebar from './renderer/js/modules/sns/SNSSidebar.js';

        // Mock API client
        window.api = {
            get: async (url) => {
                if (url === '/api/sns/user-stats') {
                    return {
                        level: 5,
                        credit: 150,
                        money: 15000,
                        life: 140,
                        iq: 85,
                        energy: 170,
                        move: 200,
                        exp: 45
                    };
                }
                if (url === '/api/sns/contacts') {
                    return [
                        { account: 'user1', nick_name: 'Alice', new_message_flag: true },
                        { account: 'user2', nick_name: 'Bob', new_message_flag: false },
                        { account: 'user3', nick_name: 'Charlie with a very long name that should be truncated', new_message_flag: false },
                        { account: 'user4', nick_name: 'David', new_message_flag: true },
                        { account: 'user5', nick_name: 'Eve', new_message_flag: false },
                        { account: 'user6', nick_name: 'Frank', new_message_flag: false },
                        { account: 'user7', nick_name: 'Grace', new_message_flag: false },
                        { account: 'user8', nick_name: 'Henry', new_message_flag: false },
                        { account: 'user9', nick_name: 'Ivy', new_message_flag: true },
                        { account: 'user10', nick_name: 'Jack', new_message_flag: false },
                    ];
                }
                if (url === '/api/map/trades') {
                    return [
                        { trade_id: 1, title: 'Buy Coffee', pay: '$5', detail: 'Morning coffee', trade_with_name: 'Cafe', status: 0 },
                        { trade_id: 2, title: 'Sell Books with a very long title that should be truncated', pay: '$20', detail: 'Old textbooks that I dont need anymore and want to sell to someone', trade_with_name: 'Library', status: 1 },
                        { trade_id: 3, title: 'Rent Bike', pay: '$10', detail: 'Daily rental', trade_with_name: 'Bike Shop', status: 0 },
                        { trade_id: 4, title: 'Buy Groceries', pay: '$50', detail: 'Weekly shopping', trade_with_name: 'Supermarket', status: 0 },
                        { trade_id: 5, title: 'Sell Phone', pay: '$200', detail: 'Old iPhone', trade_with_name: 'Tech Store', status: 1 },
                        { trade_id: 6, title: 'Buy Laptop', pay: '$1000', detail: 'New MacBook Pro', trade_with_name: 'Apple Store', status: 0 },
                    ];
                }
                return null;
            },
            post: async (url, data) => {
                console.log('POST', url, data);
                return { success: true };
            }
        };

        // Render sidebar
        const container = document.getElementById('snsContainer');
        container.innerHTML = SNSSidebar.render();
        
        // Initialize
        await SNSSidebar.init();
    </script>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('theme-dark');
        }
    </script>
</body>
</html>
